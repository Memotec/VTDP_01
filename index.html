<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNS/ATM INVENTORY - ĐỘI THÔNG TIN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Toast Animation */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .table-container { -webkit-overflow-scrolling: touch; overflow-x: auto; }

        /* PRINT QR Layout */
        #printQRArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #mainApp, #loginOverlay, #toastContainer, #advAuditModal { display: none !important; }
            #printQRArea, #printQRArea * { visibility: visible; }
            #printQRArea {
                position: absolute; left: 0; top: 0; width: 210mm;
                display: grid !important; grid-template-columns: repeat(6, 1fr);
                gap: 5mm; padding: 10mm; background: white;
            }
            .qr-item { width: 30mm; height: 40mm; display: flex; flex-direction: column; align-items: center; page-break-inside: avoid; }
            .qr-item canvas { width: 30mm !important; height: 30mm !important; }
            .qr-text { font-size: 8pt; font-weight: bold; margin-top: 2mm; text-align: center; text-transform: uppercase; font-family: sans-serif; color: black; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col relative">

<div id="toastContainer" class="fixed top-4 right-4 z-[99999] flex flex-col gap-3 w-full max-w-[calc(100%-2rem)] sm:max-w-sm"></div>

<div id="loginOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md flex items-center justify-center z-[10000] p-4">
    <div class="bg-white p-6 sm:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 01-2-2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">CNS/ATM</h1>
            <p class="text-xs font-bold text-slate-500 mt-2 uppercase tracking-widest">Đội Thông Tin - Bảo Đảm Kỹ Thuật</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase ml-1">Tài khoản</label>
                <input type="text" id="user" class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all bg-slate-50 text-base" placeholder="admin / guest">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase ml-1">Mật khẩu</label>
                <input type="password" id="pass" class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all bg-slate-50 text-base" placeholder="••••••••">
            </div>
            <button onclick="checkLogin()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-200 transition-all active:scale-[0.98] text-base uppercase tracking-wide">
                Đăng Nhập Hệ Thống
            </button>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden flex-1 flex flex-col w-full max-w-7xl mx-auto p-3 sm:p-6 lg:p-8">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
            <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">Vật Tư CNS/ATM</h1>
            <p class="text-sm font-medium text-slate-500">Hệ thống quản lý nội bộ Đội Thông Tin</p>
        </div>
        
        <div id="syncStatusWrapper" class="hidden items-center px-4 py-2 rounded-2xl border shadow-sm text-xs font-bold transition-all uppercase tracking-tighter">
            <span id="syncIcon" class="mr-2">⚪</span>
            <span id="syncText">Đang khởi tạo...</span>
        </div>
    </div>

    <div class="flex flex-col gap-6">
        
        <div id="adminArea" class="hidden bg-white rounded-3xl shadow-sm border border-slate-200 p-5 sm:p-7">
            <h2 class="text-xs font-black text-indigo-600 uppercase mb-5 flex items-center gap-2 tracking-widest">
                <span class="w-2 h-2 rounded-full bg-indigo-600"></span>
                Cập nhật thiết bị kỹ thuật
            </h2>
            
            <input type="hidden" id="editIndex" value="-1">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5">
                <div class="sm:col-span-2">
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Tên thiết bị / Model *</label>
                    <input type="text" id="inName" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none bg-slate-50 transition-all">
                </div>

                </div>

                </div>

                </button>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">

        <div class="flex flex-col sm:flex-row gap-3 mt-8">

        </div>

<div id="printQRArea"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIjGNzZBq5jvoddUuLRFcitskUEy_iD0O9LVwKJVQoKFspSth2FLr4g7PXlMgbCD48/exec";
    const STORAGE_KEY = 'cns_data_v26_final';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let role = null;

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        let bgClass = 'bg-white border-slate-200 text-slate-800';
        let icon = '🔔';
        if (type === 'success') { bgClass = 'bg-emerald-50 border-emerald-200 text-emerald-800'; icon = '✅'; }
        if (type === 'error') { bgClass = 'bg-rose-50 border-rose-200 text-rose-800'; icon = '❌'; }
        toast.className = `toast-enter flex items-center gap-3 px-5 py-4 rounded-2xl border shadow-xl ${bgClass} text-sm font-bold`;
        toast.innerHTML = `<span>${icon}</span><span class="flex-1">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;
        if ((u === 'admin' && p === 'admin') || (u === 'guest' && p === '123456')) {
            role = u; 
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            if(role === 'admin') document.getElementById('adminArea').classList.remove('hidden');
            showToast("Đăng nhập hệ thống!", "success");
            initCloudFirstSync();
        } else showToast("Sai thông tin!", "error");
    }

    function updateSyncUI(status, message) {
        const wrapper = document.getElementById('syncStatusWrapper');
        const icon = document.getElementById('syncIcon');
        const text = document.getElementById('syncText');
        wrapper.classList.remove('hidden', 'bg-amber-100', 'text-amber-800', 'bg-emerald-100', 'text-emerald-800', 'bg-rose-100', 'text-rose-800');
        if (status === 'loading') { wrapper.classList.add('flex', 'bg-amber-100', 'text-amber-800'); icon.innerText = '🟡'; }
        else if (status === 'online') { wrapper.classList.add('flex', 'bg-emerald-100', 'text-emerald-800'); icon.innerText = '🟢'; }
        else { wrapper.classList.add('flex', 'bg-rose-100', 'text-rose-800'); icon.innerText = '🔴'; }
        text.innerText = message;
    }

    async function initCloudFirstSync() {
        updateSyncUI('loading', 'Đang tải...');
        try {
            const res = await fetch(WEB_APP_URL);
            const cloudData = await res.json();
            if (cloudData && Array.isArray(cloudData)) {
                inventory = cloudData;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
                updateSyncUI('online', 'Cloud Synced');
            }
        } catch (e) { updateSyncUI('offline', 'Local Mode'); }
        render();
    }

    async function syncCloud() {
        showToast("Đang đồng bộ dữ liệu...", "info");
        try {
            const params = new URLSearchParams(); 
            params.append('data', JSON.stringify(inventory));
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: params });
            showToast("Đã lưu lên Cloud!", "success");
            updateSyncUI('online', 'Cloud Ready');
        } catch (e) { showToast("Lỗi đồng bộ!", "error"); }
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        tbody.innerHTML = '';
        let rowCount = 0;
        inventory.forEach((item, idx) => {
            if (Object.values(item).some(v => String(v).toLowerCase().includes(q))) {
                rowCount++;
                let badge = '<span class="text-slate-300">--</span>';
                if(item.auditStatus === 'OK') badge = `<div class="flex flex-col"><span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded text-[9px] font-bold">🟢 OK</span><span class="text-[8px] text-slate-400 mt-0.5">${item.auditDate}</span></div>`;
                if(item.auditStatus === 'MISSING') badge = `<div class="flex flex-col"><span class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-[9px] font-bold">🔴 THIẾU</span><span class="text-[8px] text-slate-400 mt-0.5">${item.auditDate}</span></div>`;

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-4 text-center text-slate-400 font-mono text-xs">${rowCount}</td>
                    <td class="px-4 py-4 font-bold text-slate-900">${item.name}</td>
                    <td class="px-4 py-4 text-slate-500 font-mono text-xs">${item.sn}</td>
                    <td class="px-4 py-4 text-center"><span class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded text-[10px] font-bold">${item.warehouse||'-'}</span></td>
                    <td class="px-4 py-4 text-center font-black">${item.qty}</td>
                    <td class="px-4 py-4 flex justify-center items-center h-full">${badge}</td>
                    <td class="px-4 py-4 text-center">
                        <button class="bg-slate-100 text-slate-600 hover:bg-indigo-600 hover:text-white p-2 rounded-lg transition-all" onclick="editItem(${idx})">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </button>
                    </td>
                </tr>`;
            }
        });
    }

    function openAdvAuditModal() { document.getElementById('advAuditModal').classList.replace('hidden', 'flex'); document.getElementById('audWarehouse').focus(); }
    function closeAdvAuditModal() { document.getElementById('advAuditModal').classList.replace('flex', 'hidden'); }

    function processAdvancedAudit() {
        const wh = document.getElementById('audWarehouse').value.trim();
        const sn = document.getElementById('audSN').value.trim();
        const nt = document.getElementById('audNote').value.trim();
        const st = document.querySelector('input[name="audStatus"]:checked').value;
        const dt = new Date().toLocaleDateString('vi-VN');

        if(!wh && !sn) return showToast("Nhập dữ liệu để kiểm!", "error");
        let count = 0;
        inventory.forEach(item => {
            if((wh && item.warehouse === wh) || (sn && item.sn === sn)) {
                item.auditStatus = st; item.auditDate = dt; item.auditNote = nt; count++;
            }
        });
        if(count > 0) { save(); showToast(`Đã kiểm kê ${count} thiết bị`, "success"); closeAdvAuditModal(); }
        else showToast("Không tìm thấy!", "error");
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); render(); }
    
    function addItem() {
        const name = document.getElementById('inName').value.trim();
        const sn = document.getElementById('inSN').value.trim();
        if(!name || !sn) return showToast("Thiếu Tên/SN!", "error");
        inventory.push({ 
            name, sn, 
            pn: document.getElementById('inPN').value.trim(), 
            code: document.getElementById('inCode').value.trim(), 
            warehouse: document.getElementById('inWarehouse').value.trim().toUpperCase(), 
            qty: parseInt(document.getElementById('inQty').value) || 1, 
            loc: document.getElementById('inLoc').value.trim(), 
            auditStatus: null, auditDate: null, auditNote: "" 
        });
        save(); clearForm(); showToast("Đã thêm!", "success");
    }

    function editItem(idx) {
        if(role !== 'admin') return showToast("Cần quyền Admin!", "error");
        const i = inventory[idx]; document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = i.name; document.getElementById('inSN').value = i.sn;
        document.getElementById('inPN').value = i.pn||''; document.getElementById('inCode').value = i.code||'';
        document.getElementById('inWarehouse').value = i.warehouse||''; document.getElementById('inLoc').value = i.loc||'';
        document.getElementById('inQty').value = i.qty;
        document.getElementById('btnAdd').classList.add('hidden');
        document.getElementById('btnUpdate').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx] = { ...inventory[idx], 
            name: document.getElementById('inName').value, 
            sn: document.getElementById('inSN').value, 
            pn: document.getElementById('inPN').value, 
            code: document.getElementById('inCode').value, 
            warehouse: document.getElementById('inWarehouse').value.toUpperCase(), 
            qty: document.getElementById('inQty').value, 
            loc: document.getElementById('inLoc').value 
        };
        save(); clearForm(); showToast("Đã lưu!", "success");
    }

    function clearForm() { 
        document.getElementById('editIndex').value = "-1";
        document.querySelectorAll('#adminArea input').forEach(i => i.value = i.id==='inQty'?'1':'');
        document.getElementById('btnAdd').classList.remove('hidden');
        document.getElementById('btnUpdate').classList.add('hidden');
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(inventory);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, `CNS_ATM_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function exportInventoryBalanceReport() {
        const win = window.open('','_blank');
        const rows = inventory.map((i,x) => `<tr><td>${x+1}</td><td style="text-align:left">${i.name}</td><td>${i.sn}</td><td>${i.warehouse||'-'}</td><td>${i.qty}</td><td>${i.loc||'-'}</td></tr>`).join('');
        win.document.write(`<html><head><style>body{font-family:serif;padding:40px;line-height:1.6;} .header{text-align:center;margin-bottom:30px;} table{width:100%;border-collapse:collapse;margin-top:20px;} th,td{border:1px solid #000;padding:8px;text-align:center;} th{background:#f2f2f2;} .footer{margin-top:50px;display:grid;grid-template-columns:1fr 1fr;text-align:center;}</style></head><body>
            <div class="header"><h3>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</h3><h4>Độc lập - Tự do - Hạnh phúc</h4><hr width="200px"><br><h2>PHIẾU TỒN KHO THIẾT BỊ CNS/ATM</h2><p>Thời điểm: ${new Date().toLocaleString('vi-VN')}</p></div>
            <table><thead><tr><th>STT</th><th>Thiết bị / Model</th><th>S/N</th><th>Mã Kho</th><th>SL</th><th>Vị trí</th></tr></thead><tbody>${rows}</tbody></table>
            <div class="footer"><div><b>PHỤ TRÁCH KHO</b><br><br><br><br>(Ký, họ tên)</div><div><b>ĐỘI TRƯỞNG</b><br><br><br><br>(Ký, họ tên)</div></div>
            <script>window.onload=()=>window.print()</` + `script></body></html>`);
        win.document.close();
    }

    function exportAuditProfessionalReport() {
        const auditedCount = inventory.filter(i => i.auditStatus).length;
        const win = window.open('','_blank');
        const rows = inventory.map((i,x) => `<tr><td>${x+1}</td><td style="text-align:left">${i.name}</td><td>${i.sn}</td><td>${i.auditStatus === 'OK' ? '🟢 Tồn tại' : (i.auditStatus === 'MISSING' ? '🔴 Thiếu' : '-')}</td><td>${i.auditDate||'-'}</td><td style="text-align:left;font-size:11px">${i.auditNote||'-'}</td></tr>`).join('');
        win.document.write(`<html><head><style>body{font-family:serif;padding:40px;line-height:1.5;} .header{text-align:center;margin-bottom:30px;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #000;padding:6px;text-align:center;} th{background:#eee;} .sum{margin:20px 0;font-weight:bold;}</style></head><body>
            <div class="header"><h3>BÁO CÁO KẾT QUẢ KIỂM KÊ THỰC TẾ</h3><p>ĐỘI THÔNG TIN - KHO CNS/ATM</p></div>
            <div class="sum">Tổng số thiết bị danh mục: ${inventory.length} | Đã kiểm tra thực tế: ${auditedCount}</div>
            <table><thead><tr><th width="40">STT</th><th>Tên thiết bị</th><th>Số Serial (S/N)</th><th>Trạng thái</th><th>Ngày kiểm</th><th>Ghi chú đối chiếu</th></tr></thead><tbody>${rows}</tbody></table>
            <div style="margin-top:40px;display:flex;justify-content:space-between;padding:0 50px;">
                <div style="text-align:center"><b>NGƯỜI KIỂM KÊ</b><br><br><br><br>(Ký tên)</div>
                <div style="text-align:center"><b>XÁC NHẬN CỦA ĐỘI</b><br><br><br><br>(Ký tên)</div>
            </div>
            <script>window.onload=()=>window.print()</` + `script></body></html>`);
        win.document.close();
    }

    function printQRCodeOnly() {
        const area = document.getElementById('printQRArea'); area.innerHTML = '';
        const uniqueWh = [...new Set(inventory.filter(i => i.warehouse).map(i => i.warehouse))];
        if(uniqueWh.length === 0) return showToast("Không có Mã Kho!", "error");
        uniqueWh.forEach(wh => {
            const div = document.createElement('div'); div.className = 'qr-item';
            const qr = kjua({ render: 'canvas', size: 200, text: wh, fill: '#000', back: '#fff', quiet: 1 });
            const txt = document.createElement('div'); txt.className = 'qr-text'; txt.innerText = `KHO: ${wh}`;
            div.appendChild(qr); div.appendChild(txt); area.appendChild(div);
        });
        setTimeout(() => window.print(), 500);
    }
</script>
