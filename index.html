<!DOCTYPE html>
<html lang="vi" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNS/ATM INVENTORY - ĐỘI THÔNG TIN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
                            500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .table-container { -webkit-overflow-scrolling: touch; overflow-x: auto; }
        
        /* Print Styles */
        #printQRArea, #printLabelArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #mainApp, #loginOverlay, #toastContainer, #advAuditModal, #confirmModal { display: none !important; }
            @page { size: A4; margin: 0; }

            /* QR Print Layout */
            #printQRArea:not(:empty) {
                visibility: visible; display: grid !important;
                grid-template-columns: repeat(6, 1fr); gap: 5mm; padding: 10mm;
                position: absolute; left: 0; top: 0; width: 100%; background: white;
            }
            #printQRArea * { visibility: visible; }
            .qr-item { width: 30mm; height: 40mm; display: flex; flex-direction: column; align-items: center; page-break-inside: avoid; }
            .qr-text { font-size: 7pt; font-weight: bold; margin-top: 1mm; text-align: center; color: black; }

            /* Label Print Layout */
            #printLabelArea:not(:empty) {
                visibility: visible; display: grid !important;
                grid-template-columns: repeat(3, 1fr); gap: 3mm; padding: 10mm;
                position: absolute; left: 0; top: 0; width: 100%; background: white;
            }
            #printLabelArea * { visibility: visible; }
            .label-item {
                width: 63mm; height: 35mm; border: 1.5px solid #000;
                padding: 3mm; display: flex; flex-direction: column;
                justify-content: center; page-break-inside: avoid;
                box-sizing: border-box; font-family: 'Times New Roman', serif;
                color: black; background: white;
            }
            .label-name { font-size: 10pt; font-weight: 900; border-bottom: 1px solid #000; padding-bottom: 1mm; margin-bottom: 1.5mm; text-transform: uppercase; line-height: 1.2; }
            .label-row { font-size: 9pt; margin-bottom: 0.5mm; display: flex; }
            .label-row b { width: 18mm; flex-shrink: 0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col relative selection:bg-brand-500 selection:text-white">

<!-- Toast Notification Container -->
<div id="toastContainer" class="fixed top-4 right-4 z-[99999] flex flex-col gap-3 w-full max-w-[calc(100%-2rem)] sm:max-w-sm pointer-events-none"></div>

<!-- Custom Confirm Modal -->
<div id="confirmModal" class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[10005] p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-200 dark:border-slate-800 transform scale-95 transition-transform duration-300">
        <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">Xác nhận</h3>
        <p id="confirmMsg" class="text-sm text-slate-600 dark:text-slate-400 mb-6">Bạn có chắc chắn muốn thực hiện hành động này?</p>
        <div class="flex gap-3">
            <button onclick="closeConfirm(false)" class="flex-1 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-800 dark:text-slate-200 font-semibold py-2.5 rounded-xl transition-colors">Hủy</button>
            <button onclick="closeConfirm(true)" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-semibold py-2.5 rounded-xl transition-colors shadow-lg shadow-rose-500/30">Đồng ý</button>
        </div>
    </div>
</div>

<!-- Login Overlay -->
<div id="loginOverlay" class="fixed inset-0 bg-brand-950/80 dark:bg-black/80 backdrop-blur-md flex items-center justify-center z-[10000] p-4 transition-opacity duration-500">
    <div class="bg-white dark:bg-slate-900 p-8 sm:p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-800">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-brand-100 dark:bg-brand-900/30 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-brand-600 dark:text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">CNS/ATM</h1>
            <p class="text-xs font-bold text-brand-600 dark:text-brand-400 mt-2 uppercase tracking-widest">Đội Thông Tin - Bảo Đảm Kỹ Thuật</p>
        </div>
        <div class="space-y-4">
            <div class="relative">
                <input type="text" id="user" class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all bg-slate-50 dark:bg-slate-800/50 dark:text-white" placeholder="Tài khoản (admin/guest)">
                <svg class="w-5 h-5 text-slate-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <div class="relative">
                <input type="password" id="pass" class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all bg-slate-50 dark:bg-slate-800/50 dark:text-white" placeholder="Mật khẩu" onkeypress="if(event.key === 'Enter') checkLogin()">
                <svg class="w-5 h-5 text-slate-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <button onclick="checkLogin()" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-brand-500/30 transition-all uppercase tracking-wide mt-2">Đăng Nhập</button>
        </div>
    </div>
</div>

<!-- Main App Wrapper -->
<div id="mainApp" class="hidden flex-1 flex flex-col w-full max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 opacity-0 transition-opacity duration-500">
    
    <!-- Header -->
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <div>
            <h1 class="text-2xl sm:text-3xl font-black text-slate-900 dark:text-white tracking-tight flex items-center gap-3">
                <svg class="w-8 h-8 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                Vật Tư CNS/ATM
            </h1>
            <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mt-1">Quản lý kho nội bộ Đội Thông Tin</p>
        </div>
        <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
            <div id="syncStatusWrapper" class="hidden items-center px-4 py-2.5 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm text-xs font-bold uppercase tracking-wider">
                <span id="syncIcon" class="mr-2 text-slate-400">⚪</span> <span id="syncText" class="text-slate-600 dark:text-slate-300">Sẵn sàng</span>
            </div>
            <button onclick="toggleDarkMode()" class="p-2.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" aria-label="Toggle Dark Mode">
                <svg class="w-5 h-5 text-slate-600 dark:text-slate-300 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg class="w-5 h-5 text-slate-600 dark:text-slate-300 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </header>

    <!-- Admin Data Entry Area -->
    <div id="adminArea" class="hidden bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200 dark:border-slate-800 p-6 mb-6">
        <div class="flex items-center gap-2 mb-4">
            <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-200">Khu vực quản trị</h2>
        </div>
        <input type="hidden" id="editIndex" value="-1">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4">
            <div class="lg:col-span-2">
                <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase ml-1">Tên thiết bị *</label>
                <input type="text" id="inName" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 bg-slate-50 dark:bg-slate-800/50 dark:text-white outline-none transition-all placeholder:text-slate-400" placeholder="Nhập tên vật tư...">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase ml-1">P/N</label>
                <input type="text" id="inPN" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 bg-slate-50 dark:bg-slate-800/50 dark:text-white outline-none transition-all placeholder:text-slate-400" placeholder="Part Number">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase ml-1">S/N *</label>
                <input type="text" id="inSN" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 bg-slate-50 dark:bg-slate-800/50 dark:text-white outline-none transition-all font-mono placeholder:text-slate-400" placeholder="Serial Number">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase ml-1">Mã Kho (QR)</label>
                <input type="text" id="inWarehouse" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 bg-slate-50 dark:bg-slate-800/50 dark:text-white outline-none transition-all uppercase placeholder:text-slate-400" placeholder="VD: KHO-01">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase ml-1">Vị trí / Tủ</label>
                <input type="text" id="inLoc" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 bg-slate-50 dark:bg-slate-800/50 dark:text-white outline-none transition-all placeholder:text-slate-400" placeholder="Tủ 1, Ngăn 2">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase ml-1">Số lượng</label>
                <input type="number" id="inQty" value="1" min="1" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 bg-slate-50 dark:bg-slate-800/50 dark:text-white outline-none transition-all">
            </div>
        </div>
        <div class="mt-5 flex flex-wrap gap-3">
            <button id="btnAdd" onclick="addItem()" class="bg-brand-600 hover:bg-brand-700 text-white font-bold px-6 py-2.5 rounded-xl shadow-md shadow-brand-500/20 transition-all flex items-center gap-2 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> THÊM MỚI</button>
            <button id="btnUpdate" onclick="updateItem()" class="hidden bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-6 py-2.5 rounded-xl shadow-md shadow-emerald-500/20 transition-all flex items-center gap-2 text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> CẬP NHẬT</button>
            <button onclick="clearForm()" class="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold px-6 py-2.5 rounded-xl transition-all text-sm">LÀM MỚI</button>
        </div>
    </div>

    <!-- Action Toolbar -->
    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200 dark:border-slate-800 p-4 mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
        <div class="relative w-full md:w-96">
            <svg class="w-5 h-5 text-slate-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="searchInput" oninput="render()" class="w-full pl-11 pr-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 bg-slate-50 dark:bg-slate-800/50 dark:text-white outline-none transition-all text-sm placeholder:text-slate-400" placeholder="Tìm kiếm tên, P/N, S/N, Mã Kho...">
        </div>
        
        <div class="flex flex-wrap gap-2 w-full md:w-auto justify-end">
            <button onclick="syncCloud()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 text-xs font-bold py-2.5 px-4 rounded-xl transition-colors" title="Đồng bộ Cloud">
                <svg class="w-4 h-4 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> <span class="hidden sm:inline">SYNC</span>
            </button>
            <button onclick="openAdvAuditModal()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-bold py-2.5 px-4 rounded-xl shadow-sm transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg> QUÉT MÃ
            </button>
            <div class="h-8 w-px bg-slate-200 dark:bg-slate-700 hidden md:block mx-1 self-center"></div>
            <button onclick="exportAuditProfessionalReport()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 dark:bg-slate-700 dark:hover:bg-slate-600 text-white text-xs font-bold py-2.5 px-4 rounded-xl transition-colors">
                📄 PHIẾU
            </button>
            <button onclick="exportToExcel()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2.5 px-4 rounded-xl transition-colors">
                📊 EXCEL
            </button>
            <button onclick="printQRCodeOnly()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-700 text-xs font-bold py-2.5 px-4 rounded-xl transition-colors">
                🏷️ IN QR
            </button>
            <button onclick="printLabelsOnly()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-700 text-xs font-bold py-2.5 px-4 rounded-xl transition-colors">
                🏷️ NHÃN
            </button>
        </div>
    </div>

    <!-- Data Table -->
    <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden flex-1 flex flex-col">
        <div class="table-container custom-scrollbar flex-1">
            <table class="w-full text-sm text-left whitespace-nowrap min-w-[800px]">
                <thead class="bg-slate-50 dark:bg-slate-800/80 sticky top-0 z-10 border-b border-slate-200 dark:border-slate-700">
                    <tr class="text-[11px] uppercase text-slate-500 dark:text-slate-400 font-black tracking-wider">
                        <th class="px-6 py-4 text-center w-16">STT</th>
                        <th class="px-6 py-4">Thiết bị / Vật tư</th>
                        <th class="px-6 py-4">S/N</th>
                        <th class="px-6 py-4 text-center">Mã Kho</th>
                        <th class="px-6 py-4 text-center w-20">SL</th>
                        <th class="px-6 py-4 text-center">Kiểm kê</th>
                        <th class="px-6 py-4 text-center w-24 sticky right-0 bg-slate-50 dark:bg-slate-800/80">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody" class="divide-y divide-slate-100 dark:divide-slate-800/50">
                    <!-- Rows rendered here -->
                </tbody>
            </table>
        </div>
        <div id="tableFooter" class="px-6 py-4 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 text-xs font-semibold text-slate-500 dark:text-slate-400 flex justify-between items-center">
            <span id="totalItemsDisplay">Đang tải dữ liệu...</span>
            <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Trực tuyến</span>
        </div>
    </div>
</div>

<!-- Advanced Audit Modal -->
<div id="advAuditModal" class="fixed inset-0 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm hidden items-center justify-center z-[10000] p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-slate-200 dark:border-slate-800 transform scale-95 transition-transform duration-300">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-black text-slate-900 dark:text-white flex items-center gap-2">
                <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                Kiểm kê thiết bị
            </h3>
            <button onclick="closeAdvAuditModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Mã quét (QR / Barcode)</label>
                <input type="text" id="audInput" class="w-full px-4 py-3.5 rounded-xl border-2 border-indigo-100 dark:border-slate-700 focus:border-indigo-500 focus:ring-0 bg-indigo-50/30 dark:bg-slate-800 dark:text-white outline-none transition-all placeholder:text-slate-400 text-center font-mono text-lg" placeholder="Quét hoặc nhập mã...">
            </div>
            
            <div class="flex gap-4 p-1.5 bg-slate-100 dark:bg-slate-800 rounded-xl">
                <label class="flex-1 relative cursor-pointer">
                    <input type="radio" name="audStatus" value="OK" checked class="peer sr-only">
                    <div class="text-center py-2.5 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-emerald-600 dark:peer-checked:text-emerald-400 peer-checked:shadow-sm transition-all flex justify-center items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> ĐỦ / TỐT
                    </div>
                </label>
                <label class="flex-1 relative cursor-pointer">
                    <input type="radio" name="audStatus" value="MISSING" class="peer sr-only">
                    <div class="text-center py-2.5 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-rose-600 dark:peer-checked:text-rose-400 peer-checked:shadow-sm transition-all flex justify-center items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> THIẾU / HỎNG
                    </div>
                </label>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1.5 uppercase">Ghi chú (Tùy chọn)</label>
                <textarea id="audNote" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none transition-all placeholder:text-slate-400 resize-none text-sm" placeholder="Nhập tình trạng chi tiết..."></textarea>
            </div>
        </div>

        <div class="mt-6 flex gap-3">
            <button onclick="processAdvancedAudit()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-500/30 transition-all">GHI NHẬN</button>
        </div>
    </div>
</div>

<div id="printQRArea"></div>
<div id="printLabelArea"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIjGNzZBq5jvoddUuLRFcitskUEy_iD0O9LVwKJVQoKFspSth2FLr4g7PXlMgbCD48/exec";
    const STORAGE_KEY = 'cns_inventory_v30_stable';
    
    let inventory = [];
    let role = null;
    let confirmCallback = null;

    // Load local data
    try {
        const stored = localStorage.getItem(STORAGE_KEY);
        inventory = stored ? JSON.parse(stored) : [];
    } catch (e) {
        inventory = [];
        console.error("Lỗi dữ liệu local:", e);
    }

    function initTheme() {
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    }

    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        const colors = {
            success: 'border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-900/50 dark:bg-emerald-900/20 dark:text-emerald-400',
            error: 'border-rose-200 bg-rose-50 text-rose-800 dark:border-rose-900/50 dark:bg-rose-900/20 dark:text-rose-400',
            info: 'border-slate-200 bg-white text-slate-800 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200'
        };
        const icon = type === 'success' ? '✅' : (type === 'error' ? '❌' : '🔔');
        
        toast.className = `flex items-center gap-3 px-4 py-3.5 rounded-2xl border shadow-lg ${colors[type]} text-sm font-bold transition-all transform translate-y-[-100%] opacity-0 duration-300`;
        toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
        container.appendChild(toast);
        
        // Animate in
        requestAnimationFrame(() => {
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
        });

        setTimeout(() => {
            toast.style.transform = 'translateY(-20px)';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function customConfirm(msg, callback) {
        document.getElementById('confirmMsg').innerText = msg;
        const modal = document.getElementById('confirmModal');
        const content = modal.firstElementChild;
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        // Reflow
        void modal.offsetWidth; 
        
        modal.classList.remove('opacity-0');
        content.classList.remove('scale-95');
        
        confirmCallback = callback;
    }

    function closeConfirm(result) {
        const modal = document.getElementById('confirmModal');
        const content = modal.firstElementChild;
        
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (result && confirmCallback) confirmCallback();
            confirmCallback = null;
        }, 300);
    }

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;
        if ((u === 'admin' && p === 'admin') || (u === 'guest' && p === '123456')) {
            role = u;
            
            // Hide Login
            const login = document.getElementById('loginOverlay');
            login.classList.add('opacity-0');
            setTimeout(() => {
                login.classList.add('hidden');
                
                // Show App
                const app = document.getElementById('mainApp');
                app.classList.remove('hidden');
                // Reflow
                void app.offsetWidth;
                app.classList.remove('opacity-0');
                
                if(role === 'admin') document.getElementById('adminArea').classList.remove('hidden');
                initCloudSync();
            }, 500);

        } else {
            showToast("Sai tài khoản hoặc mật khẩu!", "error");
        }
    }

    function updateSyncStatus(status) {
        const wrapper = document.getElementById('syncStatusWrapper');
        const icon = document.getElementById('syncIcon');
        const text = document.getElementById('syncText');
        wrapper.classList.remove('hidden', 'flex');
        wrapper.classList.add('flex');

        if (status === 'syncing') {
            icon.innerHTML = `<svg class="animate-spin w-4 h-4 text-brand-500" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            text.innerText = "Đang đồng bộ...";
        } else if (status === 'success') {
            icon.innerHTML = `<span class="text-emerald-500">🟢</span>`;
            text.innerText = "Đã đồng bộ";
            setTimeout(() => { wrapper.classList.add('hidden'); }, 3000);
        } else if (status === 'error') {
            icon.innerHTML = `<span class="text-rose-500">🔴</span>`;
            text.innerText = "Lỗi kết nối";
        }
    }

    async function initCloudSync() {
        updateSyncStatus('syncing');
        try {
            const res = await fetch(`${WEB_APP_URL}?t=${Date.now()}`);
            if (!res.ok) throw new Error("Network response was not ok");
            const text = await res.text();
            if (text) {
                const data = JSON.parse(text);
                if (data && Array.isArray(data) && data.length > 0) {
                    inventory = data;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
                }
            }
            updateSyncStatus('success');
        } catch (e) {
            console.warn('Sync failed or offline mode:', e.message);
            updateSyncStatus('error');
        }
        render();
    }

    async function syncCloud() {
        updateSyncStatus('syncing');
        try {
            const params = new URLSearchParams();
            params.append('data', JSON.stringify(inventory));
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: params });
            updateSyncStatus('success');
            showToast("Đã gửi yêu cầu lưu Cloud!", "success");
        } catch (e) {
            updateSyncStatus('error');
            showToast("Lỗi kết nối Cloud!", "error");
        }
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const footerText = document.getElementById('totalItemsDisplay');
        if (!tbody) return;
        
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        tbody.innerHTML = '';
        let count = 0;
        let totalQty = 0;

        inventory.forEach((item, idx) => {
            const searchable = `${item.name} ${item.sn} ${item.pn} ${item.warehouse}`.toLowerCase();
            if (searchable.includes(q)) {
                count++;
                totalQty += (item.qty || 0);
                
                let badge = '<span class="text-slate-400 text-xs">--</span>';
                if (item.auditStatus === 'OK') {
                    badge = `<span class="inline-flex items-center gap-1 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 px-2 py-1 rounded-md text-[10px] font-bold border border-emerald-100 dark:border-emerald-800/50"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> ĐỦ</span>`;
                } else if (item.auditStatus === 'MISSING') {
                    badge = `<span class="inline-flex items-center gap-1 bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 px-2 py-1 rounded-md text-[10px] font-bold border border-rose-100 dark:border-rose-800/50"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> THIẾU</span>`;
                }

                tbody.innerHTML += `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group">
                    <td class="px-6 py-4 text-center font-bold text-slate-400">${count}</td>
                    <td class="px-6 py-3">
                        <div class="font-bold text-slate-900 dark:text-white group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors line-clamp-1" title="${item.name}">${item.name}</div>
                        <div class="text-[11px] text-slate-500 flex items-center gap-2 mt-0.5">
                            <span title="Part Number">P/N: <span class="font-medium text-slate-700 dark:text-slate-300">${item.pn || 'N/A'}</span></span>
                            ${item.loc ? `<span class="text-slate-300 dark:text-slate-600">|</span> <span title="Vị trí"><svg class="w-3 h-3 inline pb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> ${item.loc}</span>` : ''}
                        </div>
                    </td>
                    <td class="px-6 py-4 font-mono text-xs text-slate-700 dark:text-slate-300 bg-slate-50/50 dark:bg-transparent">${item.sn}</td>
                    <td class="px-6 py-4 text-center">
                        ${item.warehouse ? `<span class="bg-brand-50 dark:bg-brand-900/20 px-2.5 py-1.5 rounded-lg text-brand-700 dark:text-brand-300 font-bold text-[11px] border border-brand-100 dark:border-brand-800/50 font-mono">${item.warehouse}</span>` : '<span class="text-slate-300 dark:text-slate-600 text-xs">--</span>'}
                    </td>
                    <td class="px-6 py-4 text-center font-black text-slate-800 dark:text-slate-200">${item.qty}</td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex flex-col items-center justify-center gap-1">
                            ${badge}
                            ${item.auditDate ? `<span class="text-[9px] text-slate-400 block">${item.auditDate.split(' ')[0]}</span>` : ''}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center sticky right-0 bg-white dark:bg-slate-900 group-hover:bg-slate-50 dark:group-hover:bg-slate-800/50 transition-colors shadow-[-10px_0_15px_-5px_rgba(0,0,0,0.05)] dark:shadow-[-10px_0_15px_-5px_rgba(0,0,0,0.5)]">
                        <div class="flex gap-2 justify-center">
                            <button onclick="editItem(${idx})" class="p-2 bg-slate-100 hover:bg-brand-50 dark:bg-slate-800 dark:hover:bg-brand-900/30 text-slate-600 hover:text-brand-600 dark:text-slate-400 dark:hover:text-brand-400 rounded-lg transition-colors" title="Chỉnh sửa">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            ${role === 'admin' ? `
                            <button onclick="deleteItem(${idx})" class="p-2 bg-slate-100 hover:bg-rose-50 dark:bg-slate-800 dark:hover:bg-rose-900/30 text-slate-600 hover:text-rose-500 dark:text-slate-400 dark:hover:text-rose-400 rounded-lg transition-colors" title="Xóa">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }
        });

        if (count === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-12 text-center text-slate-500 dark:text-slate-400 bg-slate-50/50 dark:bg-slate-800/20"><div class="flex flex-col items-center justify-center"><svg class="w-12 h-12 mb-3 text-slate-300 dark:text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>Không tìm thấy dữ liệu.</div></td></tr>`;
        }
        
        footerText.innerHTML = `Hiển thị <b>${count}</b> thiết bị (Tổng SL: <b>${totalQty}</b>)`;
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
    }

    function addItem() {
        const name = document.getElementById('inName').value.trim();
        const sn = document.getElementById('inSN').value.trim();
        if(!name || !sn) return showToast("Vui lòng nhập Tên thiết bị và S/N!", "error");
        
        inventory.push({
            name, sn,
            pn: document.getElementById('inPN').value.trim(),
            warehouse: document.getElementById('inWarehouse').value.trim().toUpperCase(),
            qty: parseInt(document.getElementById('inQty').value) || 1,
            loc: document.getElementById('inLoc').value.trim(),
            auditStatus: null, auditDate: null, auditNote: ""
        });
        save(); clearForm(); showToast("Đã thêm thiết bị mới!", "success");
    }

    function editItem(idx) {
        if(role !== 'admin') return showToast("Chỉ Admin mới có quyền sửa đổi!", "error");
        
        const i = inventory[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = i.name;
        document.getElementById('inSN').value = i.sn;
        document.getElementById('inPN').value = i.pn || '';
        document.getElementById('inWarehouse').value = i.warehouse || '';
        document.getElementById('inLoc').value = i.loc || '';
        document.getElementById('inQty').value = i.qty;
        
        document.getElementById('btnAdd').classList.add('hidden');
        document.getElementById('btnUpdate').classList.remove('hidden');
        
        // Focus admin area
        const adminArea = document.getElementById('adminArea');
        adminArea.classList.add('ring-2', 'ring-brand-500', 'ring-offset-2', 'dark:ring-offset-slate-950');
        setTimeout(() => adminArea.classList.remove('ring-2', 'ring-brand-500', 'ring-offset-2', 'dark:ring-offset-slate-950'), 1000);
        window.scrollTo({ top: adminArea.offsetTop - 20, behavior: 'smooth' });
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        if (idx === "-1") return;
        
        const name = document.getElementById('inName').value.trim();
        const sn = document.getElementById('inSN').value.trim();
        if(!name || !sn) return showToast("Vui lòng nhập Tên thiết bị và S/N!", "error");

        inventory[idx] = { ...inventory[idx],
            name: name,
            sn: sn,
            pn: document.getElementById('inPN').value.trim(),
            warehouse: document.getElementById('inWarehouse').value.trim().toUpperCase(),
            qty: parseInt(document.getElementById('inQty').value) || 1,
            loc: document.getElementById('inLoc').value.trim()
        };
        save(); clearForm(); showToast("Cập nhật thành công!", "success");
    }

    function deleteItem(idx) {
        customConfirm(`Bạn có chắc chắn muốn xóa thiết bị:\n"${inventory[idx].name}" ?`, () => {
            inventory.splice(idx, 1);
            save();
            showToast("Đã xóa thiết bị.", "success");
        });
    }

    function clearForm() {
        document.getElementById('editIndex').value = "-1";
        document.querySelectorAll('#adminArea input').forEach(i => {
            if(i.type !== 'hidden') i.value = (i.id==='inQty'?'1':'');
        });
        document.getElementById('btnAdd').classList.remove('hidden');
        document.getElementById('btnUpdate').classList.add('hidden');
    }

    function openAdvAuditModal() { 
        const modal = document.getElementById('advAuditModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        void modal.offsetWidth; // reflow
        modal.classList.remove('opacity-0');
        modal.firstElementChild.classList.remove('scale-95');
        
        setTimeout(() => document.getElementById('audInput').focus(), 100);
    }
    
    function closeAdvAuditModal() { 
        const modal = document.getElementById('advAuditModal');
        modal.classList.add('opacity-0');
        modal.firstElementChild.classList.add('scale-95');
        
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('audInput').value = ''; 
            document.getElementById('audNote').value = '';
        }, 300);
    }

    function processAdvancedAudit() {
        const input = document.getElementById('audInput').value.trim().toUpperCase();
        if(!input) return showToast("Vui lòng nhập mã!", "error");

        const nt = document.getElementById('audNote').value.trim();
        const st = document.querySelector('input[name="audStatus"]:checked').value;
        const now = new Date();
        const dt = now.toLocaleDateString('vi-VN') + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
        
        let found = 0;
        inventory.forEach(i => {
            // Match Warehouse code or exactly matching S/N (case insensitive for code)
            if((i.warehouse && i.warehouse.toUpperCase() === input) || (i.sn && i.sn.toUpperCase() === input)) { 
                i.auditStatus = st; 
                i.auditDate = dt; 
                i.auditNote = nt; 
                found++; 
            }
        });
        
        if(found > 0) { 
            save(); 
            showToast(`Đã ghi nhận kiểm kê cho ${found} mục`, "success"); 
            closeAdvAuditModal(); 
            // Optional: trigger background sync
            syncCloud(); 
        } else {
            showToast("Không tìm thấy mã trong hệ thống!", "error");
        }
    }

    function printQRCodeOnly() {
        document.getElementById('printLabelArea').innerHTML = '';
        const area = document.getElementById('printQRArea');
        area.innerHTML = '';
        
        let count = 0;
        inventory.forEach(item => {
            if(item.warehouse) {
                count++;
                const div = document.createElement('div');
                div.className = 'qr-item';
                div.innerHTML = `<div class="qr-target"></div><div class="qr-text">${item.warehouse}<br>${item.sn}</div>`;
                area.appendChild(div);
                
                if (typeof kjua === 'function') {
                    kjua({ 
                        render: 'canvas', 
                        text: item.warehouse, 
                        size: 150, // slightly smaller to ensure fit
                        fill: '#000', 
                        back: '#fff', 
                        quiet: 1, // small quiet zone
                        container: div.querySelector('.qr-target') 
                    });
                }
            }
        });
        
        if(count === 0) return showToast("Không có thiết bị nào có Mã Kho để in QR!", "info");
        
        // Give time for canvas to render before calling print
        setTimeout(() => window.print(), 800);
    }

    function printLabelsOnly() {
        document.getElementById('printQRArea').innerHTML = '';
        const area = document.getElementById('printLabelArea');
        area.innerHTML = '';
        
        inventory.forEach(item => {
            area.innerHTML += `
                <div class="label-item">
                    <div class="label-name">${item.name}</div>
                    <div class="label-row"><b>P/N:</b> ${item.pn || 'N/A'}</div>
                    <div class="label-row"><b>S/N:</b> ${item.sn}</div>
                    <div class="label-row"><b>Mã Kho:</b> ${item.warehouse || 'N/A'}</div>
                </div>`;
        });
        
        if(inventory.length === 0) return showToast("Danh sách trống!", "info");
        setTimeout(() => window.print(), 500);
    }

    function exportAuditProfessionalReport() {
        if(inventory.length === 0) return showToast("Danh sách trống!", "error");
        
        const win = window.open('','_blank');
        const now = new Date();
        const dateStr = `Ngày ${now.getDate()} tháng ${now.getMonth() + 1} năm ${now.getFullYear()}`;
        const timeStr = `${now.getHours()}h${String(now.getMinutes()).padStart(2, '0')}`;

        const rows = inventory.map((i,x) => `
            <tr>
                <td style="text-align:center;">${x+1}</td>
                <td style="text-align:left; font-weight:bold; font-size:11pt;">${i.name}</td>
                <td style="text-align:center;">${i.pn || '-'}</td>
                <td style="text-align:center; font-family: 'Courier New', monospace; font-weight:bold;">${i.sn}</td>
                <td style="text-align:center; background-color: #f9fafb; font-weight: bold; color: #1e40af;">${i.warehouse || '-'}</td>
                <td style="text-align:center; font-weight: bold;">${i.qty}</td>
                <td style="text-align:center; font-size:10pt;">${i.auditStatus === 'OK' ? '<b style="color:green">🟢 ĐỦ</b>' : (i.auditStatus === 'MISSING' ? '<b style="color:red">🔴 THIẾU</b>' : '-')}</td>
                <td style="text-align:left; font-size:10pt; line-height:1.3;">
                    ${i.auditDate ? `<small style="color:#666"><i>(${i.auditDate})</i></small><br>` : ''}
                    ${i.auditNote || ''}
                </td>
            </tr>`).join('');

        win.document.write(`
            <html>
            <head>
                <title>Biên bản kiểm kê - CNS/ATM</title>
                <style>
                    @media print {
                        @page { size: A4 landscape; margin: 10mm 10mm 15mm 10mm; }
                        body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                        .no-print { display: none; }
                    }
                    body { 
                        font-family: "Times New Roman", Times, serif; 
                        line-height: 1.5; margin: 0; padding: 20px; color: #000;
                    }
                    .header-table { width: 100%; border: none; margin-bottom: 20px; }
                    .header-table td { border: none; vertical-align: top; padding: 0; }
                    
                    .title-section { text-align: center; margin-bottom: 25px; }
                    .main-title { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
                    .sub-title { font-size: 12pt; font-style: italic; }

                    table.data-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
                    table.data-table th, table.data-table td { border: 1px solid #000; padding: 8px 5px; word-wrap: break-word; }
                    table.data-table th { background-color: #f3f4f6; font-size: 10pt; text-transform: uppercase; font-weight: bold; }
                    
                    .col-stt { width: 40px; }
                    .col-name { width: 22%; }
                    .col-pn { width: 12%; }
                    .col-sn { width: 16%; }
                    .col-code { width: 10%; }
                    .col-qty { width: 45px; }
                    .col-status { width: 10%; }
                    .col-note { width: auto; }

                    .signature-grid { margin-top: 40px; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; }
                    .sig-box { page-break-inside: avoid; }
                    .sig-title { font-weight: bold; margin-bottom: 70px; text-transform: uppercase; }
                    
                    .print-btn {
                        position: fixed; top: 20px; right: 20px; padding: 10px 20px;
                        background: #2563eb; color: white; border: none; border-radius: 5px;
                        font-weight: bold; cursor: pointer; font-family: sans-serif;
                    }
                </style>
            </head>
            <body>
                <button class="no-print print-btn" onclick="window.print()">🖨️ In Biên Bản</button>
                <table class="header-table">
                    <tr>
                        <td style="width: 45%; text-align: center;">
                            CÔNG TY QUẢN LÝ BAY MIỀN NAM<br>
                            <b>TRUNG TÂM BẢO ĐẢM KỸ THUẬT</b><br>
                            <u><b>ĐỘI THÔNG TIN</b></u>
                        </td>
                        <td style="text-align: center;">
                            <b>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</b><br>
                            <b>Độc lập - Tự do - Hạnh phúc</b><br>
                            <div style="margin-top: 5px;"><i>..........., ${dateStr}</i></div>
                        </td>
                    </tr>
                </table>

                <div class="title-section">
                    <div class="main-title">BIÊN BẢN KIỂM KÊ VẬT TƯ THIẾT BỊ</div>
                    <div class="sub-title">Thời điểm kiểm kê: ${timeStr}, ${dateStr}</div>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="col-stt">STT</th>
                            <th class="col-name">Tên Thiết Bị / Vật Tư</th>
                            <th class="col-pn">P/N</th>
                            <th class="col-sn">S/N</th>
                            <th class="col-code">Mã Kho</th>
                            <th class="col-qty">SL</th>
                            <th class="col-status">Tình trạng</th>
                            <th class="col-note">Ghi chú</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>

                <div class="signature-grid">
                    <div class="sig-box">
                        <div class="sig-title">Người lập biểu</div>
                        <i>(Ký và ghi rõ họ tên)</i>
                    </div>
                    <div class="sig-box">
                        <div class="sig-title">Thành viên kiểm kê</div>
                        <i>(Ký và ghi rõ họ tên)</i>
                    </div>
                    <div class="sig-box">
                        <div class="sig-title">Đội trưởng xác nhận</div>
                        <i>(Ký và ghi rõ họ tên)</i>
                    </div>
                </div>
                
                <script>
                    window.onload = () => { setTimeout(() => { window.print(); }, 800); }
                <\/script>
            </body>
            </html>
        `);
        win.document.close();
    }

    function exportToExcel() {
        if (typeof XLSX === 'undefined') return showToast("Lỗi tải thư viện xuất Excel!", "error");
        if(inventory.length === 0) return showToast("Không có dữ liệu để xuất!", "info");

        // Map data to vietnamese headers
        const exportData = inventory.map((item, index) => ({
            "STT": index + 1,
            "Tên Thiết Bị": item.name,
            "Part Number": item.pn || '',
            "Serial Number": item.sn,
            "Mã Kho": item.warehouse || '',
            "Vị trí": item.loc || '',
            "Số Lượng": item.qty,
            "Trạng Thái Kiểm Kê": item.auditStatus === 'OK' ? 'Đủ' : (item.auditStatus === 'MISSING' ? 'Thiếu' : 'Chưa kiểm'),
            "Ngày Kiểm Kê": item.auditDate || '',
            "Ghi Chú": item.auditNote || ''
        }));

        const ws = XLSX.utils.json_to_sheet(exportData);
        
        // Auto-size columns roughly
        const wscols = [ {wch:5}, {wch:30}, {wch:15}, {wch:20}, {wch:15}, {wch:15}, {wch:10}, {wch:15}, {wch:20}, {wch:30} ];
        ws['!cols'] = wscols;

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory CNS");
        XLSX.writeFile(wb, `Inventory_CNS_${new Date().toISOString().slice(0,10)}.xlsx`);
        showToast("Đang tải file Excel...", "success");
    }

    window.onload = () => { 
        initTheme(); 
        document.getElementById('user').focus();
    };
</script>
</body>
</html>
