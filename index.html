<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby3ecczSKLGb81GXQSqirqM0s-qQH-jQDjJpZQohnNS_aUQgtH15KzvB8JYr7LJbYql/exec";

const STORAGE_KEY = 'cns_inventory_v30_stable';
const SESSION_KEY = 'cns_session_active';

let inventory = [];
let role = null;
let confirmCallback = null;
let isSyncing = false;

/* =========================
   LOGIN
========================= */

function checkLogin() {

    const u = document.getElementById('user').value
        .toLowerCase()
        .trim();

    const p = document.getElementById('pass').value;

    if (
        (u === 'admin' && p === 'admin') ||
        (u === 'guest' && p === '123456')
    ) {

        role = u;

        localStorage.setItem(
            SESSION_KEY,
            role
        );

        initAppView();

        showToast(
            `Chào mừng ${u.toUpperCase()}!`,
            "success"
        );

    } else {

        showToast(
            "Sai tài khoản hoặc mật khẩu!",
            "error"
        );
    }
}

/* =========================
   APP INIT
========================= */

function initAppView() {

    if (!role) return;

    const login = document.getElementById('loginOverlay');
    const app = document.getElementById('mainApp');

    login.classList.add('hidden');

    app.classList.remove('hidden');

    setTimeout(() => {
        app.classList.add('opacity-100');
    }, 50);

    if (role === 'admin') {
        document.getElementById('adminArea')
            .classList.remove('hidden');
    }

    initCloudSync();
}

/* =========================
   CLOUD LOAD
========================= */

async function initCloudSync() {

    if (isSyncing) return;

    updateSyncStatus('syncing');

    try {

        const res = await fetch(
            `${WEB_APP_URL}?t=${Date.now()}`
        );

        if (!res.ok) {
            throw new Error("Không kết nối được Cloud");
        }

        const text = await res.text();

        if (
            text.includes("<html") ||
            text.includes("<!DOCTYPE")
        ) {
            throw new Error("Apps Script chưa public");
        }

        const cloudData = JSON.parse(text);

        if (Array.isArray(cloudData)) {

            inventory = cloudData.map(item => ({

                name: item.name || "",
                pn: item.pn || "",
                sn: item.sn || "",

                code: item.code || "",

                warehouse: item.warehouse || "",

                qty: parseInt(item.qty) || 0,

                loc: item.loc || "",

                auditStatus: item.auditStatus || "",
                auditDate: item.auditDate || "",
                auditNote: item.auditNote || "",

                createdAt: item.createdAt || "",
                updatedAt: item.updatedAt || ""

            }));

            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify(inventory)
            );
        }

        const now = new Date();

        updateSyncStatus(
            'success',
            now.getHours() + ":" +
            String(now.getMinutes()).padStart(2, '0')
        );

    } catch (e) {

        console.error(e);

        updateSyncStatus('error');

        const local = localStorage.getItem(STORAGE_KEY);

        if (local) {
            inventory = JSON.parse(local);
        }

        showToast(
            "Đang dùng dữ liệu local",
            "error"
        );
    }

    render();
}

/* =========================
   CLOUD SAVE
========================= */

async function syncCloud() {

    if (isSyncing) return;

    updateSyncStatus('syncing');

    try {

        const cleanData = inventory.map(item => ({

            name: item.name || "",
            pn: item.pn || "",
            sn: item.sn || "",

            code: item.code || item.warehouse || "",

            warehouse: item.warehouse || "",

            qty: parseInt(item.qty) || 0,

            loc: item.loc || "",

            auditStatus: item.auditStatus || "",
            auditDate: item.auditDate || "",
            auditNote: item.auditNote || "",

            createdAt: item.createdAt || "",
            updatedAt: item.updatedAt || ""

        }));

        const params = new URLSearchParams();

        params.append(
            'data',
            JSON.stringify(cleanData)
        );

        const response = await fetch(
            WEB_APP_URL,
            {
                method: "POST",
                headers: {
                    "Content-Type":
                    "application/x-www-form-urlencoded"
                },
                body: params
            }
        );

        const text = await response.text();

        if (text.includes("Error")) {
            throw new Error(text);
        }

        const now = new Date();

        updateSyncStatus(
            'success',
            now.getHours() + ":" +
            String(now.getMinutes()).padStart(2, '0')
        );

        showToast(
            "Đồng bộ Cloud thành công!",
            "success"
        );

    } catch (e) {

        console.error(e);

        updateSyncStatus('error');

        showToast(
            "Lỗi đồng bộ Cloud!",
            "error"
        );
    }
}

/* =========================
   STATUS
========================= */

function updateSyncStatus(status, time = null) {

    const wrapper =
        document.getElementById(
            'syncStatusWrapper'
        );

    const icon =
        document.getElementById(
            'syncIcon'
        );

    const text =
        document.getElementById(
            'syncText'
        );

    const timeLabel =
        document.getElementById(
            'syncTime'
        );

    wrapper.classList.remove(
        'hidden',
        'opacity-60'
    );

    wrapper.classList.add('flex');

    if (status === 'syncing') {

        isSyncing = true;

        icon.innerHTML =
            `<span class="animate-pulse text-brand-500">●</span>`;

        text.innerText =
            "Đang kết nối...";

    }

    else if (status === 'success') {

        isSyncing = false;

        icon.innerHTML =
            `<span class="text-emerald-500">●</span>`;

        text.innerText =
            "Đã đồng bộ";

        if (time) {
            timeLabel.innerText =
                `Lần cuối: ${time}`;
        }

        setTimeout(() => {

            if (!isSyncing) {
                wrapper.classList.add('opacity-60');
            }

        }, 5000);
    }

    else {

        isSyncing = false;

        icon.innerHTML =
            `<span class="text-rose-500">●</span>`;

        text.innerText =
            "Lỗi Cloud";

        timeLabel.innerText =
            "Kiểm tra Apps Script";
    }
}

/* =========================
   SAVE
========================= */

function save() {

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(inventory)
    );

    render();
}

/* =========================
   ADD ITEM
========================= */

function addItem() {

    const name =
        document.getElementById('inName')
        .value
        .trim();

    const sn =
        document.getElementById('inSN')
        .value
        .trim();

    if (!name || !sn) {

        return showToast(
            "Nhập Tên thiết bị và S/N!",
            "error"
        );
    }

    const warehouse =
        document.getElementById(
            'inWarehouse'
        )
        .value
        .trim()
        .toUpperCase();

    inventory.push({

        name: name,

        pn: document.getElementById('inPN')
            .value
            .trim(),

        sn: sn,

        code: warehouse,

        warehouse: warehouse,

        qty: parseInt(
            document.getElementById('inQty').value
        ) || 1,

        loc: document.getElementById('inLoc')
            .value
            .trim(),

        auditStatus: "",
        auditDate: "",
        auditNote: "",

        createdAt: new Date().toISOString(),

        updatedAt: new Date().toISOString()

    });

    save();

    clearForm();

    showToast(
        "Đã thêm vật tư!",
        "success"
    );

    syncCloud();
}

/* =========================
   UPDATE ITEM
========================= */

function updateItem() {

    const idx =
        document.getElementById(
            'editIndex'
        ).value;

    if (idx === "-1") return;

    const warehouse =
        document.getElementById(
            'inWarehouse'
        )
        .value
        .trim()
        .toUpperCase();

    inventory[idx] = {

        ...inventory[idx],

        name: document.getElementById('inName')
            .value
            .trim(),

        pn: document.getElementById('inPN')
            .value
            .trim(),

        sn: document.getElementById('inSN')
            .value
            .trim(),

        code: warehouse,

        warehouse: warehouse,

        qty: parseInt(
            document.getElementById('inQty').value
        ) || 1,

        loc: document.getElementById('inLoc')
            .value
            .trim(),

        updatedAt: new Date().toISOString()
    };

    save();

    clearForm();

    showToast(
        "Cập nhật thành công!",
        "success"
    );

    syncCloud();
}

/* =========================
   AUDIT
========================= */

function processAdvancedAudit() {

    const input =
        document.getElementById('audInput')
        .value
        .trim()
        .toUpperCase();

    if (!input) {

        return showToast(
            "Nhập mã kiểm kê!",
            "error"
        );
    }

    const status =
        document.querySelector(
            'input[name="audStatus"]:checked'
        ).value;

    const note =
        document.getElementById('audNote')
        .value
        .trim();

    const auditTime = new Date();

    let found = false;

    inventory = inventory.map(item => {

        const warehouse =
            (item.warehouse || '')
            .toUpperCase();

        const sn =
            (item.sn || '')
            .toUpperCase();

        const code =
            (item.code || '')
            .toUpperCase();

        if (
            warehouse === input ||
            sn === input ||
            code === input
        ) {

            found = true;

            return {

                ...item,

                auditStatus: status,

                auditDate:
                    auditTime.toLocaleString('vi-VN'),

                auditTimestamp:
                    auditTime.getTime(),

                auditNote: note,

                updatedAt:
                    new Date().toISOString()
            };
        }

        return item;
    });

    if (!found) {

        return showToast(
            "Không tìm thấy thiết bị!",
            "error"
        );
    }

    save();

    syncCloud();

    closeAdvAuditModal();

    document.getElementById('audInput').value = '';

    document.getElementById('audNote').value = '';

    showToast(
        "Đã cập nhật kiểm kê!",
        "success"
    );
}

/* =========================
   DELETE
========================= */

function deleteItem(idx) {

    customConfirm(
        `Xóa thiết bị: ${inventory[idx].name}?`,
        () => {

            inventory.splice(idx, 1);

            save();

            syncCloud();

            showToast(
                "Đã xóa.",
                "success"
            );
        }
    );
}

/* =========================
   CLEAR FORM
========================= */

function clearForm() {

    document.getElementById(
        'editIndex'
    ).value = "-1";

    document.querySelectorAll(
        '#adminArea input'
    ).forEach(i => {

        if (i.type !== 'hidden') {

            i.value =
                (i.id === 'inQty')
                ? '1'
                : '';
        }
    });

    document.getElementById('btnAdd')
        .classList.remove('hidden');

    document.getElementById('btnUpdate')
        .classList.add('hidden');
}

/* =========================
   LOGOUT
========================= */

function handleLogout() {

    localStorage.removeItem(
        SESSION_KEY
    );

    location.reload();
}

/* =========================
   DARK MODE
========================= */

function toggleDarkMode() {

    const isDark =
        document.documentElement
        .classList.toggle('dark');

    localStorage.setItem(
        'theme',
        isDark ? 'dark' : 'light'
    );
}

/* =========================
   LOAD
========================= */

window.onload = () => {

    if (
        localStorage.getItem('theme')
        === 'dark'
    ) {
        document.documentElement
            .classList.add('dark');
    }

    const stored =
        localStorage.getItem(
            STORAGE_KEY
        );

    if (stored) {
        inventory = JSON.parse(stored);
    }

    const savedRole =
        localStorage.getItem(
            SESSION_KEY
        );

    if (savedRole) {

        role = savedRole;

        initAppView();
    }
};
</script>
