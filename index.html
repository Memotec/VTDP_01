<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <title>CNS/ATM INVENTORY - ĐỘI THÔNG TIN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
    .dark body { background-color: #0f172a; color: #f1f5f9; }
    
    /* Chuyển các văn bản chính sang tông xanh đậm chuyên nghiệp */
    .text-primary-dark { color: #1e1b4b; } /* indigo-950 */
    .dark .text-primary-dark { color: #f8fafc; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .table-container { -webkit-overflow-scrolling: touch; overflow-x: auto; }
        
        .inventory-row:hover { background-color: #f1f5f9 !important; }
        .dark .inventory-row:hover { background-color: #1e293b !important; }
        .inventory-row { transition: all 0.2s ease; border-bottom: 1px solid #f1f5f9; }
        .dark .inventory-row { border-bottom: 1px solid #1e293b; }
        
        .badge-warehouse { 
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            color: #3730a3;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.025em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #printQRArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #mainApp, #loginOverlay, #toastContainer, #advAuditModal { display: none !important; }
            #printQRArea, #printQRArea * { visibility: visible; }
            #printQRArea {
                position: absolute; left: 0; top: 0; width: 210mm;
                display: grid !important; grid-template-columns: repeat(6, 1fr);
                gap: 5mm; padding: 10mm; background: white;
            }
            .qr-item { width: 30mm; height: 40mm; display: flex; flex-direction: column; align-items: center; page-break-inside: avoid; }
            .qr-item canvas { width: 30mm !important; height: 30mm !important; }
            .qr-text { font-size: 8pt; font-weight: bold; margin-top: 2mm; text-align: center; text-transform: uppercase; color: black; }
        }

        @media (max-width: 640px) {
            .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .btn-grid button { width: 100% !important; margin: 0 !important; font-size: 9px !important; padding: 10px 4px !important; }
        }
    </style>
</head>

<div id="printQRArea"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIjGNzZBq5jvoddUuLRFcitskUEy_iD0O9LVwKJVQoKFspSth2FLr4g7PXlMgbCD48/exec";
    const STORAGE_KEY = 'cns_data_v26_final';
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let role = null;

    function initTheme() {
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            updateThemeUI(true);
        } else {
            document.documentElement.classList.remove('dark');
            updateThemeUI(false);
        }
    }

    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateThemeUI(isDark);
        showToast(`Đã chuyển sang Chế độ ${isDark ? 'tối' : 'sáng'}`, "info");
    }

    function updateThemeUI(isDark) {
        const icon = isDark ? '☀️' : '🌙';
        const text = isDark ? 'Chế độ sáng' : 'Chế độ tối';
        if(document.getElementById('darkIcon')) document.getElementById('darkIcon').innerText = icon;
        if(document.getElementById('darkIconMob')) document.getElementById('darkIconMob').innerText = icon;
        if(document.getElementById('darkText')) document.getElementById('darkText').innerText = text;
    }

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        let bgClass = 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-100';
        let icon = '🔔';
        if (type === 'success') { bgClass = 'bg-emerald-50 dark:bg-emerald-950/30 border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400'; icon = '✅'; }
        if (type === 'error') { bgClass = 'bg-rose-50 dark:bg-rose-950/30 border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-400'; icon = '❌'; }
        toast.className = `toast-enter flex items-center gap-3 px-5 py-4 rounded-2xl border shadow-xl ${bgClass} text-sm font-bold`;
        toast.innerHTML = `<span>${icon}</span><span class="flex-1">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;
        if ((u === 'admin' && p === 'admin') || (u === 'guest' && p === '123456')) {
            role = u;
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            if(role === 'admin') document.getElementById('adminArea').classList.remove('hidden');
            showToast("Đăng nhập thành công!", "success");
            initCloudFirstSync();
        } else {
            showToast("Tài khoản hoặc mật khẩu không chính xác!", "error");
        }
    }

    function updateSyncUI(status, message) {
        const wrapper = document.getElementById('syncStatusWrapper');
        const icon = document.getElementById('syncIcon');
        const text = document.getElementById('syncText');
        wrapper.classList.remove('hidden', 'bg-amber-100', 'text-amber-800', 'bg-emerald-100', 'text-emerald-800', 'bg-rose-100', 'text-rose-800');
        if (status === 'loading') { wrapper.classList.add('flex', 'bg-amber-100', 'text-amber-800'); icon.innerText = '🟡'; }
        else if (status === 'online') { wrapper.classList.add('flex', 'bg-emerald-100', 'text-emerald-800'); icon.innerText = '🟢'; }
        else { wrapper.classList.add('flex', 'bg-rose-100', 'text-rose-800'); icon.innerText = '🔴'; }
        text.innerText = message;
    }

    async function initCloudFirstSync() {
        updateSyncUI('loading', 'Đang kết nối...');
        try {
            const response = await fetch(`${WEB_APP_URL}?t=${new Date().getTime()}`);
            const cloudData = await response.json();
            if (cloudData && Array.isArray(cloudData)) {
                if (cloudData.length > 0) {
                    inventory = cloudData;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
                    updateSyncUI('online', 'Đã đồng bộ');
                } else {
                    updateSyncUI('online', 'Cloud trống');
                }
            }
        } catch (e) { 
            updateSyncUI('offline', 'Chế độ Ngoại tuyến'); 
        }
        render();
    }

    async function syncCloud() {
        const btn = document.getElementById('btnSync');
        btn.disabled = true;
        updateSyncUI('loading', 'Đang đẩy...');
        try {
            const params = new URLSearchParams();
            params.append('data', JSON.stringify(inventory));
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: params,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            setTimeout(() => {
                showToast("Đã lưu lên Cloud!", "success");
                updateSyncUI('online', 'Đã lưu Cloud');
                btn.disabled = false;
            }, 1000);
        } catch (e) {
            showToast("Lỗi đồng bộ!", "error");
            updateSyncUI('offline', 'Lỗi kết nối');
            btn.disabled = false;
        }
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        tbody.innerHTML = '';
        let rowCount = 0;

        inventory.forEach((item, idx) => {
            if (Object.values(item).some(v => String(v).toLowerCase().includes(q))) {
                rowCount++;
                let badge = '<span class="text-slate-300 dark:text-slate-600 italic text-xs font-medium">--</span>';
                if(item.auditStatus === 'OK') {
                    badge = `
                        <div class="flex flex-col items-center">
                            <span class="inline-flex items-center bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-400 px-2.5 py-1 rounded-full text-[10px] font-bold border border-emerald-100 dark:border-emerald-900">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5"></span>SẴN SÀNG
                            </span>
                            <span class="text-[9px] text-slate-400 mt-1">${item.auditDate}</span>
                        </div>`;
                }
                if(item.auditStatus === 'MISSING') {
                    badge = `
                        <div class="flex flex-col items-center">
                            <span class="inline-flex items-center bg-rose-50 dark:bg-rose-950/30 text-rose-700 dark:text-rose-400 px-2.5 py-1 rounded-full text-[10px] font-bold border border-rose-100 dark:border-rose-900">
                                <span class="w-1.5 h-1.5 rounded-full bg-rose-500 mr-1.5"></span>THIẾU/LỖI
                            </span>
                            <span class="text-[9px] text-slate-400 mt-1">${item.auditDate}</span>
                        </div>`;
                }

                tbody.innerHTML += `
                <tr class="inventory-row">
                    <td class="px-6 py-6 text-center">
                        <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-50 dark:bg-slate-800 text-indigo-900 dark:text-slate-400 font-bold text-xs border border-slate-100 dark:border-slate-700">${rowCount}</span>
                    </td>
                    <td class="px-6 py-6">
                        <div class="flex flex-col">
                            <span class="text-indigo-950 dark:text-white font-bold text-[15px] leading-tight mb-1">${item.name}</span>
                            <span class="text-slate-400 dark:text-slate-500 text-xs font-medium">P/N: ${item.pn || 'N/A'}</span>
                        </div>
                    </td>
                    <td class="px-6 py-6">
                        <span class="font-mono text-[13px] text-indigo-900 dark:text-slate-300 bg-indigo-50/50 dark:bg-slate-800 px-2 py-1 rounded border border-indigo-100 dark:border-slate-700">${item.sn}</span>
                    </td>
                    <td class="px-6 py-6 text-center">
                        ${item.warehouse ? `<span class="badge-warehouse">${item.warehouse}</span>` : '--'}
                    </td>
                    <td class="px-6 py-6 text-center">
                        <span class="text-indigo-950 dark:text-white font-black text-base">${item.qty}</span>
                    </td>
                    <td class="px-6 py-6">
                        <div class="flex flex-col">
                            <span class="text-slate-900 dark:text-white font-bold text-[15px] leading-tight mb-1">${item.name}</span>
                            <span class="text-slate-400 dark:text-slate-500 text-xs font-medium">P/N: ${item.pn || 'N/A'}</span>
                        </div>
                    </td>
                    <td class="px-6 py-6">
                        <span class="font-mono text-[13px] text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-800 px-2 py-1 rounded border border-slate-100 dark:border-slate-700">${item.sn}</span>
                    </td>
                    <td class="px-6 py-6 text-center">
                        ${item.warehouse ? `<span class="badge-warehouse">${item.warehouse}</span>` : '--'}
                    </td>
                    <td class="px-6 py-6 text-center">
                        <span class="text-slate-900 dark:text-white font-black text-base">${item.qty}</span>
                    </td>
                    <td class="px-6 py-6 text-center leading-none">${badge}</td>
                    <td class="px-6 py-6 text-center">
                        <div class="flex justify-center gap-2">
                            <button class="w-9 h-9 flex items-center justify-center bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-600 hover:text-white rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 transition-all active:scale-95" onclick="editItem(${idx})">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            ${role === 'admin' ? `
                            <button class="w-9 h-9 flex items-center justify-center bg-white dark:bg-slate-800 text-rose-500 hover:bg-rose-600 hover:text-white rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 transition-all active:scale-95" onclick="deleteItem(${idx})">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }
        });
    }

    function addItem() {
        const name = document.getElementById('inName').value.trim();
        const sn = document.getElementById('inSN').value.trim();
        if(!name || !sn) return showToast("Vui lòng nhập Tên và S/N!", "error");
        inventory.push({
            name, sn,
            pn: document.getElementById('inPN').value.trim(),
            warehouse: document.getElementById('inWarehouse').value.trim().toUpperCase(),
            qty: parseInt(document.getElementById('inQty').value) || 1,
            loc: document.getElementById('inLoc').value.trim(),
            auditStatus: null, auditDate: null, auditNote: ""
        });
        save();
        clearForm();
        showToast("Đã thêm vật tư!", "success");
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        if(idx === "-1") return;
        inventory[idx] = { ...inventory[idx],
            name: document.getElementById('inName').value.trim(),
            sn: document.getElementById('inSN').value.trim(),
            pn: document.getElementById('inPN').value.trim(),
            warehouse: document.getElementById('inWarehouse').value.trim().toUpperCase(),
            qty: parseInt(document.getElementById('inQty').value) || 1,
            loc: document.getElementById('inLoc').value.trim()
        };
        save();
        clearForm();
        showToast("Đã cập nhật!", "success");
    }

    function deleteItem(idx) {
        if(confirm(`Xác nhận xóa: ${inventory[idx].name}?`)) {
            inventory.splice(idx, 1);
            save();
            showToast("Đã xóa!", "success");
        }
    }

    function editItem(idx) {
        if(role !== 'admin') return showToast("Yêu cầu quyền Admin!", "error");
        const i = inventory[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = i.name;
        document.getElementById('inSN').value = i.sn;
        document.getElementById('inPN').value = i.pn || '';
        document.getElementById('inWarehouse').value = i.warehouse || '';
        document.getElementById('inLoc').value = i.loc || '';
        document.getElementById('inQty').value = i.qty;
        document.getElementById('btnAdd').classList.add('hidden');
        document.getElementById('btnUpdate').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearForm() {
        document.getElementById('editIndex').value = "-1";
        document.querySelectorAll('#adminArea input').forEach(i => i.value = (i.id==='inQty'?'1':''));
        document.getElementById('btnAdd').classList.remove('hidden');
        document.getElementById('btnUpdate').classList.add('hidden');
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
    }

    function openAdvAuditModal() { document.getElementById('advAuditModal').classList.replace('hidden', 'flex'); document.getElementById('audInput').focus(); }
    function closeAdvAuditModal() { document.getElementById('advAuditModal').classList.replace('flex', 'hidden'); document.getElementById('audInput').value = ''; }

    function processAdvancedAudit() {
        const input = document.getElementById('audInput').value.trim().toUpperCase();
        const nt = document.getElementById('audNote').value.trim();
        const st = document.querySelector('input[name="audStatus"]:checked').value;
        const dt = new Date().toLocaleDateString('vi-VN');
        if(!input) return showToast("Nhập S/N hoặc Mã Kho!", "error");
        let foundCount = 0;
        inventory.forEach(item => {
            if(item.warehouse === input || item.sn === input) {
                item.auditStatus = st; item.auditDate = dt; item.auditNote = nt; foundCount++;
            }
        });
        if(foundCount > 0) { save(); showToast(`Đã kiểm kê ${foundCount} thiết bị`, "success"); closeAdvAuditModal(); }
        else showToast("Không tìm thấy!", "error");
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(inventory);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, `Kho_CNS_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function printQRCodeOnly() {
        const area = document.getElementById('printQRArea');
        area.innerHTML = '';
        const filtered = inventory.filter(i => i.warehouse);
        if(filtered.length === 0) return showToast("Không có mã kho!", "error");
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'qr-item';
            const qrCanvas = kjua({ text: item.warehouse, size: 200, quiet: 1 });
            div.appendChild(qrCanvas);
            div.innerHTML += `<div class="qr-text">${item.warehouse}</div>`;
            div.innerHTML += `<div style="font-size:6pt; text-align:center">${item.name.substring(0,25)}</div>`;
            area.appendChild(div);
        });
        setTimeout(() => window.print(), 500);
    }

    function exportAuditProfessionalReport() {
        const win = window.open('','_blank');
        const rows = inventory.map((i,x) => `
            <tr>
                <td>${x+1}</td>
                <td style="text-align:left">${i.name}</td>
                <td>${i.sn}</td>
                <td>${i.auditStatus === 'OK' ? '🟢 OK' : (i.auditStatus === 'MISSING' ? '🔴 THIẾU' : '-')}</td>
                <td>${i.auditDate||'-'}</td>
                <td style="text-align:left">${i.auditNote||'-'}</td>
            </tr>`).join('');
        win.document.write(`
            <html><head><style>
                body{font-family:serif;padding:30px;font-size:12px;}
                table{width:100%;border-collapse:collapse;margin-top:15px;}
                th,td{border:1px solid #000;padding:6px;text-align:center;}
            </style></head><body>
                <h2 style="text-align:center">BIÊN BẢN KIỂM KÊ VẬT TƯ</h2>
                <table><thead><tr><th>STT</th><th>Thiết bị</th><th>S/N</th><th>Trạng thái</th><th>Ngày kiểm</th><th>Ghi chú</th></tr></thead>
                <tbody>${rows}</tbody></table>
                <script>window.onload=()=>window.print()</` + `script>
            </body></html>`);
        win.document.close();
    }

    window.onload = () => { initTheme(); };
</script>
</body>
</html>
