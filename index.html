<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNS/ATM INVENTORY - ĐỘI THÔNG TIN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
    .dark body { background-color: #0f172a; color: #f1f5f9; }
    
    .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .table-container { -webkit-overflow-scrolling: touch; overflow-x: auto; }
    .inventory-row:hover { background-color: #f8fafc !important; }
    .dark .inventory-row:hover { background-color: #1e293b !important; }
    
    #printQRArea, #printLabelArea { display: none; }

    @media print {
        body * { visibility: hidden; }
        #mainApp, #loginOverlay, #toastContainer, #advAuditModal { display: none !important; }
        
        @page { size: A4; margin: 0; }

        #printQRArea:not(:empty) {
            visibility: visible;
            display: grid !important;
            grid-template-columns: repeat(6, 1fr);
            gap: 5mm;
            padding: 10mm;
            position: absolute; left: 0; top: 0; width: 100%;
            background: white;
        }
        #printQRArea * { visibility: visible; }
        .qr-item { width: 30mm; height: 40mm; display: flex; flex-direction: column; align-items: center; page-break-inside: avoid; }
        .qr-text { font-size: 7pt; font-weight: bold; margin-top: 1mm; text-align: center; color: black; }

        #printLabelArea:not(:empty) {
            visibility: visible;
            display: grid !important;
            grid-template-columns: repeat(3, 1fr);
            gap: 3mm;
            padding: 10mm;
            position: absolute; left: 0; top: 0; width: 100%;
            background: white;
        }
        #printLabelArea * { visibility: visible; }
        .label-item {
            width: 63mm; height: 35mm; border: 1.5px solid #000;
            padding: 3mm; display: flex; flex-direction: column;
            justify-content: center; page-break-inside: avoid;
            box-sizing: border-box; font-family: 'Times New Roman', serif;
            color: black; background: white;
        }
        .label-name { font-size: 10pt; font-weight: 900; border-bottom: 1px solid #000; padding-bottom: 1mm; margin-bottom: 1.5mm; text-transform: uppercase; line-height: 1.2; }
        .label-row { font-size: 9pt; margin-bottom: 0.5mm; display: flex; }
        .label-row b { width: 18mm; flex-shrink: 0; }
    }

    @media (max-width: 640px) {
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-grid button { width: 100% !important; margin: 0 !important; font-size: 9px !important; }
    }
    </style>
</head>
<body class="text-indigo-950 dark:text-slate-200 antialiased min-h-screen flex flex-col relative bg-slate-50 dark:bg-slate-950">

<div id="toastContainer" class="fixed top-4 right-4 z-[99999] flex flex-col gap-3 w-full max-w-[calc(100%-2rem)] sm:max-w-sm"></div>

<div id="loginOverlay" class="fixed inset-0 bg-indigo-950/50 dark:bg-black/70 backdrop-blur-md flex items-center justify-center z-[10000] p-4">
    <div class="bg-white dark:bg-slate-900 p-6 sm:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-950 dark:text-white tracking-tight">CNS/ATM</h1>
            <p class="text-xs font-bold text-indigo-600/70 dark:text-slate-400 mt-2 uppercase tracking-widest">Đội Thông Tin - Bảo Đảm Kỹ Thuật</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="user" class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 focus:border-indigo-500 outline-none transition-all bg-slate-50 dark:bg-slate-800 dark:text-white" placeholder="Tài khoản (admin/guest)">
            <input type="password" id="pass" class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 dark:border-slate-700 focus:border-indigo-500 outline-none transition-all bg-slate-50 dark:bg-slate-800 dark:text-white" placeholder="Mật khẩu">
            <button onclick="checkLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all uppercase tracking-wide">Đăng Nhập</button>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden flex-1 flex flex-col w-full max-w-7xl mx-auto p-3 sm:p-6 lg:p-8">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
            <h1 class="text-2xl sm:text-3xl font-black text-indigo-950 dark:text-white tracking-tight">Vật Tư CNS/ATM</h1>
            <p class="text-sm font-medium text-indigo-600/60 dark:text-slate-400">Quản lý kho nội bộ Đội Thông Tin</p>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleDarkMode()" class="p-3 bg-slate-200 dark:bg-slate-800 rounded-2xl">🌙</button>
            <div id="syncStatusWrapper" class="hidden items-center px-4 py-2 rounded-2xl border dark:border-slate-700 text-[10px] font-black uppercase tracking-widest">
                <span id="syncIcon" class="mr-2">⚪</span> <span id="syncText">Sẵn sàng</span>
            </div>
        </div>
    </div>

    <div id="adminArea" class="hidden bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 p-5 mb-6">
        <input type="hidden" id="editIndex" value="-1">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="sm:col-span-2">
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Tên thiết bị *</label>
                <input type="text" id="inName" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">P/N</label>
                <input type="text" id="inPN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">S/N *</label>
                <input type="text" id="inSN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Mã Kho (QR)</label>
                <input type="text" id="inWarehouse" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Vị trí</label>
                <input type="text" id="inLoc" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Số lượng</label>
                <input type="number" id="inQty" value="1" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white outline-none">
            </div>
        </div>
        <div class="mt-4 flex gap-3">
            <button id="btnAdd" onclick="addItem()" class="bg-indigo-600 text-white font-bold px-6 py-3 rounded-xl shadow-lg">THÊM MỚI</button>
            <button id="btnUpdate" onclick="updateItem()" class="hidden bg-sky-500 text-white font-bold px-6 py-3 rounded-xl shadow-lg">CẬP NHẬT</button>
            <button onclick="clearForm()" class="bg-slate-200 dark:bg-slate-800 px-6 py-3 rounded-xl">LÀM MỚI</button>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 p-5 mb-6">
        <input type="text" id="searchInput" oninput="render()" class="w-full px-4 py-4 rounded-2xl border border-slate-200 dark:border-slate-700 outline-none bg-slate-50 dark:bg-slate-800 dark:text-white mb-4" placeholder="Tìm kiếm nhanh...">
        
        <div class="btn-grid flex flex-wrap gap-2">
            <button onclick="syncCloud()" class="bg-emerald-500 text-white text-[10px] font-black py-2.5 px-4 rounded-lg uppercase">🔄 CLOUD</button>
            <button onclick="openAdvAuditModal()" class="bg-slate-700 text-white text-[10px] font-black py-2.5 px-4 rounded-lg uppercase">📋 QUÉT MÃ</button>
            <button onclick="exportAuditProfessionalReport()" class="bg-indigo-500 text-white text-[10px] font-black py-2.5 px-4 rounded-lg uppercase">📄 PHIẾU</button>
            <button onclick="exportToExcel()" class="bg-emerald-700 text-white text-[10px] font-black py-2.5 px-4 rounded-lg uppercase">📊 EXCEL</button>
            <button onclick="printQRCodeOnly()" class="bg-slate-900 text-white text-[10px] font-black py-2.5 px-4 rounded-lg uppercase">🏷️ IN QR</button>
            <button onclick="printLabelsOnly()" class="bg-blue-600 text-white text-[10px] font-black py-2.5 px-4 rounded-lg uppercase">🏷️ IN NHÃN</button>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
        <div class="table-container custom-scrollbar">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-50/80 dark:bg-slate-800">
                    <tr class="text-[11px] uppercase text-slate-500 font-black">
                        <th class="px-6 py-5 text-center">STT</th>
                        <th class="px-6 py-5">Thiết bị</th>
                        <th class="px-6 py-5">S/N</th>
                        <th class="px-6 py-5 text-center">Mã Kho</th>
                        <th class="px-6 py-5 text-center">SL</th>
                        <th class="px-6 py-5 text-center">Kiểm kê</th>
                        <th class="px-6 py-5 text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="advAuditModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[10000] p-4">
    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-800">
        <h3 class="text-xl font-black mb-6 text-indigo-950 dark:text-white">📋 Kiểm kê thực tế</h3>
        <input type="text" id="audInput" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white mb-4 outline-none" placeholder="Quét Mã Kho hoặc S/N...">
        <textarea id="audNote" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-white mb-4 outline-none" placeholder="Ghi chú..."></textarea>
        <div class="flex gap-4 p-3 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-6">
            <label class="flex-1 text-center cursor-pointer text-xs font-bold text-slate-600 dark:text-slate-400"><input type="radio" name="audStatus" value="OK" checked> 🟢 OK</label>
            <label class="flex-1 text-center cursor-pointer text-xs font-bold text-slate-600 dark:text-slate-400"><input type="radio" name="audStatus" value="MISSING"> 🔴 THIẾU</label>
        </div>
        <div class="flex gap-3">
            <button onclick="processAdvancedAudit()" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-colors">CẬP NHẬT</button>
            <button onclick="closeAdvAuditModal()" class="flex-1 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-200 font-bold py-4 rounded-2xl">HỦY</button>
        </div>
    </div>
</div>

<div id="printQRArea"></div>
<div id="printLabelArea"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIjGNzZBq5jvoddUuLRFcitskUEy_iD0O9LVwKJVQoKFspSth2FLr4g7PXlMgbCD48/exec";
    const STORAGE_KEY = 'cns_inventory_v30_stable';
    
    let inventory = [];
    try {
        const stored = localStorage.getItem(STORAGE_KEY);
        inventory = stored ? JSON.parse(stored) : [];
    } catch (e) {
        inventory = [];
        console.error("Lỗi dữ liệu local:", e);
    }

    let role = null;

    function initTheme() {
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    }

    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function showToast(message) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `flex items-center gap-3 px-5 py-4 rounded-2xl border shadow-xl bg-white dark:bg-slate-800 text-sm font-bold text-indigo-950 dark:text-white transition-all`;
        toast.innerHTML = `<span>🔔</span><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;
        if ((u === 'admin' && p === 'admin') || (u === 'guest' && p === '123456')) {
            role = u;
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            if(role === 'admin') document.getElementById('adminArea').classList.remove('hidden');
            initCloudSync();
        } else {
            showToast("Sai tài khoản hoặc mật khẩu!");
        }
    }

    async function initCloudSync() {
        try {
            const res = await fetch(`${WEB_APP_URL}?t=${Date.now()}`);
            if (!res.ok) throw new Error("Network response was not ok");
            
            const text = await res.text();
            if (!text) return; // Silent return if empty
            
            const data = JSON.parse(text);
            if (data && Array.isArray(data) && data.length > 0) {
                inventory = data;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
            }
        } catch (e) { 
            console.warn('Sync failed or offline mode:', e.message); 
        }
        render();
    }

    async function syncCloud() {
        try {
            const params = new URLSearchParams();
            params.append('data', JSON.stringify(inventory));
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: params });
            showToast("Đã gửi yêu cầu lưu Cloud!");
        } catch (e) { 
            showToast("Lỗi kết nối Cloud!"); 
        }
    }

    function render() {
        const tbody = document.getElementById('inventoryBody');
        if (!tbody) return;
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        tbody.innerHTML = '';
        let count = 0;
        inventory.forEach((item, idx) => {
            const searchable = `${item.name} ${item.sn} ${item.pn} ${item.warehouse}`.toLowerCase();
            if (searchable.includes(q)) {
                count++;
                const badge = item.auditStatus === 'OK' ? '<span class="text-emerald-500 font-bold text-[10px]">🟢 OK</span>' : (item.auditStatus === 'MISSING' ? '<span class="text-rose-500 font-bold text-[10px]">🔴 THIẾU</span>' : '--');
                tbody.innerHTML += `
                <tr class="inventory-row border-b border-slate-100 dark:border-slate-800">
                    <td class="px-6 py-4 text-center font-bold text-slate-400">${count}</td>
                    <td class="px-6 py-4 font-bold text-indigo-900 dark:text-white">${item.name}<br><span class="text-[10px] text-slate-400 font-normal">P/N: ${item.pn || 'N/A'}</span></td>
                    <td class="px-6 py-4 font-mono text-xs">${item.sn}</td>
                    <td class="px-6 py-4 text-center"><span class="bg-indigo-50 dark:bg-slate-800 px-2 py-1 rounded text-indigo-700 dark:text-indigo-300 font-bold text-[11px] border border-indigo-100 dark:border-slate-700">${item.warehouse || '--'}</span></td>
                    <td class="px-6 py-4 text-center font-black">${item.qty}</td>
                    <td class="px-6 py-4 text-center">${badge}<br><span class="text-[8px] opacity-50">${item.auditDate || ''}</span></td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex gap-2 justify-center">
                            <button onclick="editItem(${idx})" class="p-2 bg-indigo-50 dark:bg-slate-800 text-indigo-600 rounded-lg">✏️</button>
                            ${role === 'admin' ? `<button onclick="deleteItem(${idx})" class="p-2 bg-rose-50 dark:bg-slate-800 text-rose-500 rounded-lg">🗑️</button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }
        });
    }

    function addItem() {
        const name = document.getElementById('inName').value.trim();
        const sn = document.getElementById('inSN').value.trim();
        if(!name || !sn) return showToast("Nhập tên và S/N!");
        inventory.push({
            name, sn,
            pn: document.getElementById('inPN').value.trim(),
            warehouse: document.getElementById('inWarehouse').value.trim().toUpperCase(),
            qty: parseInt(document.getElementById('inQty').value) || 1,
            loc: document.getElementById('inLoc').value.trim(),
            auditStatus: null, auditDate: null, auditNote: ""
        });
        save(); clearForm(); showToast("Đã thêm!");
    }

    function editItem(idx) {
        if(role !== 'admin') return showToast("Quyền Admin!");
        const i = inventory[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = i.name;
        document.getElementById('inSN').value = i.sn;
        document.getElementById('inPN').value = i.pn || '';
        document.getElementById('inWarehouse').value = i.warehouse || '';
        document.getElementById('inLoc').value = i.loc || '';
        document.getElementById('inQty').value = i.qty;
        document.getElementById('btnAdd').classList.add('hidden');
        document.getElementById('btnUpdate').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        if (idx === "-1") return;
        inventory[idx] = { ...inventory[idx],
            name: document.getElementById('inName').value.trim(),
            sn: document.getElementById('inSN').value.trim(),
            pn: document.getElementById('inPN').value.trim(),
            warehouse: document.getElementById('inWarehouse').value.trim().toUpperCase(),
            qty: parseInt(document.getElementById('inQty').value) || 1,
            loc: document.getElementById('inLoc').value.trim()
        };
        save(); clearForm(); showToast("Đã cập nhật!");
    }

    function deleteItem(idx) {
        if(confirm("Xóa thiết bị này?")) { inventory.splice(idx, 1); save(); }
    }

    function clearForm() {
        document.getElementById('editIndex').value = "-1";
        document.querySelectorAll('#adminArea input').forEach(i => i.value = (i.id==='inQty'?'1':''));
        document.getElementById('btnAdd').classList.remove('hidden');
        document.getElementById('btnUpdate').classList.add('hidden');
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
    }

    function openAdvAuditModal() { document.getElementById('advAuditModal').classList.replace('hidden', 'flex'); document.getElementById('audInput').focus(); }
    function closeAdvAuditModal() { document.getElementById('advAuditModal').classList.replace('flex', 'hidden'); document.getElementById('audInput').value = ''; }

    function processAdvancedAudit() {
        const input = document.getElementById('audInput').value.trim().toUpperCase();
        const nt = document.getElementById('audNote').value.trim();
        const st = document.querySelector('input[name="audStatus"]:checked').value;
        const now = new Date();
        const dt = now.toLocaleDateString('vi-VN') + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
        
        let found = 0;
        inventory.forEach(i => {
            if(i.warehouse === input || i.sn === input) { i.auditStatus = st; i.auditDate = dt; i.auditNote = nt; found++; }
        });
        
        if(found > 0) { save(); showToast(`Đã kiểm kê ${found} mục`); closeAdvAuditModal(); syncCloud(); }
        else showToast("Không tìm thấy!");
    }

    function printQRCodeOnly() {
        document.getElementById('printLabelArea').innerHTML = '';
        const area = document.getElementById('printQRArea');
        area.innerHTML = '';
        inventory.forEach(item => {
            if(item.warehouse) {
                const div = document.createElement('div');
                div.className = 'qr-item';
                div.innerHTML = `<div class="qr-target"></div><div class="qr-text">${item.warehouse}<br>${item.sn}</div>`;
                area.appendChild(div);
                if (typeof kjua === 'function') {
                    kjua({ render: 'canvas', text: item.warehouse, size: 200, fill: '#000', back: '#fff', container: div.querySelector('.qr-target') });
                }
            }
        });
        setTimeout(() => window.print(), 700);
    }

    function printLabelsOnly() {
        document.getElementById('printQRArea').innerHTML = '';
        const area = document.getElementById('printLabelArea');
        area.innerHTML = '';
        inventory.forEach(item => {
            area.innerHTML += `
                <div class="label-item">
                    <div class="label-name">${item.name}</div>
                    <div class="label-row"><b>P/N:</b> ${item.pn || 'N/A'}</div>
                    <div class="label-row"><b>S/N:</b> ${item.sn}</div>
                    <div class="label-row"><b>Mã Kho:</b> ${item.warehouse || 'N/A'}</div>
                </div>`;
        });
        setTimeout(() => window.print(), 700);
    }

    function exportAuditProfessionalReport() {
        const win = window.open('','_blank');
        const now = new Date();
        const dateStr = `Ngày ${now.getDate()} tháng ${now.getMonth() + 1} năm ${now.getFullYear()}`;
        const timeStr = `${now.getHours()}h${String(now.getMinutes()).padStart(2, '0')}`;

        const rows = inventory.map((i,x) => `
            <tr>
                <td style="text-align:center;">${x+1}</td>
                <td style="text-align:left; font-weight:bold; font-size:11pt;">${i.name}</td>
                <td style="text-align:center;">${i.pn || '-'}</td>
                <td style="text-align:center; font-family: 'Courier New', monospace; font-weight:bold;">${i.sn}</td>
                <td style="text-align:center; background-color: #f9fafb; font-weight: bold; color: #1e40af;">${i.warehouse || '-'}</td>
                <td style="text-align:center; font-weight: bold;">${i.qty}</td>
                <td style="text-align:center; font-size:10pt;">${i.auditStatus === 'OK' ? '<b style="color:green">🟢 OK</b>' : (i.auditStatus === 'MISSING' ? '<b style="color:red">🔴 THIẾU</b>' : '-')}</td>
                <td style="text-align:left; font-size:10pt; line-height:1.3;">
                    ${i.auditDate ? `<small><i>(${i.auditDate})</i></small><br>` : ''}
                    ${i.auditNote || ''}
                </td>
            </tr>`).join('');

        win.document.write(`
            <html>
            <head>
                <title>Biên bản kiểm kê - CNS/ATM</title>
                <style>
                    @media print {
                        @page { 
                            size: A4 landscape; 
                            margin: 10mm 10mm 15mm 10mm; 
                        }
                        body { -webkit-print-color-adjust: exact; }
                    }
                    body { 
                        font-family: "Times New Roman", Times, serif; 
                        line-height: 1.5;
                        margin: 0; padding: 20px; color: #000;
                    }
                    .header-table { width: 100%; border: none; margin-bottom: 20px; }
                    .header-table td { border: none; vertical-align: top; padding: 0; }
                    
                    .title-section { text-align: center; margin-bottom: 25px; }
                    .main-title { font-size: 18pt; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
                    .sub-title { font-size: 12pt; font-style: italic; }

                    table.data-table { 
                        width: 100%; border-collapse: collapse; table-layout: fixed; 
                    }
                    table.data-table th, table.data-table td { 
                        border: 1px solid #000; padding: 8px 5px; word-wrap: break-word; 
                    }
                    table.data-table th { 
                        background-color: #f3f4f6; font-size: 10pt; text-transform: uppercase; font-weight: bold;
                    }
                    
                    /* Tỷ lệ cột tối ưu cho khổ ngang */
                    .col-stt { width: 35px; }
                    .col-name { width: 22%; }
                    .col-pn { width: 12%; }
                    .col-sn { width: 15%; }
                    .col-code { width: 10%; }
                    .col-qty { width: 45px; }
                    .col-status { width: 10%; }
                    .col-note { width: auto; }

                    .signature-grid { 
                        margin-top: 40px; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; 
                    }
                    .sig-box { page-break-inside: avoid; }
                    .sig-title { font-weight: bold; margin-bottom: 70px; text-transform: uppercase; }
                </style>
            </head>
            <body>
                <table class="header-table">
                    <tr>
                        <td style="width: 45%; text-align: center;">
                            CÔNG TY QUẢN LÝ BAY MIỀN NAM<br>
                            <b>TRUNG TÂM BẢO ĐẢM KỸ THUẬT</b><br>
                            <u><b>ĐỘI THÔNG TIN</b></u>
                        </td>
                        <td style="text-align: center;">
                            <b>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</b><br>
                            <b>Độc lập - Tự do - Hạnh phúc</b><br>
                            <div style="margin-top: 5px;"><i>..........., ${dateStr}</i></div>
                        </td>
                    </tr>
                </table>

                <div class="title-section">
                    <div class="main-title">BIÊN BẢN KIỂM KÊ VẬT TƯ THIẾT BỊ</div>
                    <div class="sub-title">Thời điểm kiểm kê: ${timeStr}, ${dateStr}</div>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="col-stt">STT</th>
                            <th class="col-name">Tên Thiết Bị / Vật Tư</th>
                            <th class="col-pn">P/N</th>
                            <th class="col-sn">S/N</th>
                            <th class="col-code">Mã Kho</th>
                            <th class="col-qty">SL</th>
                            <th class="col-status">Tình trạng</th>
                            <th class="col-note">Ghi chú kiểm kê</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>

                <div class="signature-grid">
                    <div class="sig-box">
                        <div class="sig-title">Người lập biểu</div>
                        <i>(Ký và ghi rõ họ tên)</i>
                    </div>
                    <div class="sig-box">
                        <div class="sig-title">Thành viên kiểm kê</div>
                        <i>(Ký và ghi rõ họ tên)</i>
                    </div>
                    <div class="sig-box">
                        <div class="sig-title">Đội trưởng xác nhận</div>
                        <i>(Ký và ghi rõ họ tên)</i>
                    </div>
                </div>

                <script>
                    window.onload = () => { 
                        setTimeout(() => { window.print(); }, 500); 
                    }
                <\/script>
            </body>
            </html>
        `);
        win.document.close();
    }

    function exportToExcel() {
        if (typeof XLSX === 'undefined') return showToast("Lỗi thư viện Excel!");
        const ws = XLSX.utils.json_to_sheet(inventory);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, `Inventory_CNS_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    window.onload = () => { 
        initTheme(); 
    };
</script>
</body>
</html>
