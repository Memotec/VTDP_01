<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNS/ATM INVENTORY - ĐỘI THÔNG TIN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/kjua@0.9.0/dist/kjua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .table-container { -webkit-overflow-scrolling: touch; overflow-x: auto; }
        
        /* Improved row appearance */
        .inventory-row:hover { background-color: #f1f5f9 !important; }
        .inventory-row { transition: all 0.2s ease; border-bottom: 1px solid #f1f5f9; }
        
        /* Badge styling */
        .badge-warehouse { 
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            color: #3730a3;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.025em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #printQRArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #mainApp, #loginOverlay, #toastContainer, #advAuditModal { display: none !important; }
            #printQRArea, #printQRArea * { visibility: visible; }
            #printQRArea {
                position: absolute; left: 0; top: 0; width: 210mm;
                display: grid !important; grid-template-columns: repeat(6, 1fr);
                gap: 5mm; padding: 10mm; background: white;
            }
            .qr-item { width: 30mm; height: 40mm; display: flex; flex-direction: column; align-items: center; page-break-inside: avoid; }
            .qr-item canvas { width: 30mm !important; height: 30mm !important; }
            .qr-text { font-size: 8pt; font-weight: bold; margin-top: 2mm; text-align: center; text-transform: uppercase; color: black; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col relative">

<div id="toastContainer" class="fixed top-4 right-4 z-[99999] flex flex-col gap-3 w-full max-w-[calc(100%-2rem)] sm:max-w-sm"></div>

<div id="loginOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md flex items-center justify-center z-[10000] p-4">
    <div class="bg-white p-6 sm:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 01-2-2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">CNS/ATM</h1>
            <p class="text-xs font-bold text-slate-500 mt-2 uppercase tracking-widest">Đội Thông Tin - Bảo Đảm Kỹ Thuật</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase ml-1">Tài khoản</label>
                <input type="text" id="user" class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 focus:border-indigo-500 outline-none transition-all bg-slate-50 text-base" placeholder="admin / guest">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1.5 uppercase ml-1">Mật khẩu</label>
                <input type="password" id="pass" class="w-full px-4 py-3.5 rounded-2xl border border-slate-200 focus:border-indigo-500 outline-none transition-all bg-slate-50 text-base" placeholder="••••••••">
            </div>
            <button onclick="checkLogin()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-[0.98] text-base uppercase tracking-wide">
                Đăng Nhập Hệ Thống
            </button>
        </div>
    </div>
</div>

<div id="mainApp" class="hidden flex-1 flex flex-col w-full max-w-7xl mx-auto p-3 sm:p-6 lg:p-8">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
            <h1 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">Vật Tư CNS/ATM</h1>
            <p class="text-sm font-medium text-slate-500">Hệ thống quản lý nội bộ Đội Thông Tin</p>
        </div>
        <div id="syncStatusWrapper" class="hidden items-center px-4 py-2 rounded-2xl border shadow-sm text-[10px] font-black transition-all uppercase tracking-widest">
            <span id="syncIcon" class="mr-2">⚪</span>
            <span id="syncText">Sẵn sàng</span>
        </div>
    </div>

    <div id="adminArea" class="hidden bg-white rounded-3xl shadow-sm border border-slate-200 p-5 sm:p-7 mb-6">
        <h2 class="text-xs font-black text-indigo-600 uppercase mb-5 flex items-center gap-2 tracking-widest">
            <span class="w-2 h-2 rounded-full bg-indigo-600 animate-pulse"></span>
            Cập nhật thiết bị kỹ thuật
        </h2>
        <input type="hidden" id="editIndex" value="-1">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5">
            <div class="sm:col-span-2">
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Tên thiết bị / Model *</label>
                <input type="text" id="inName" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 bg-slate-50 outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Part Number (P/N)</label>
                <input type="text" id="inPN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 bg-slate-50 outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Serial Number (S/N) *</label>
                <input type="text" id="inSN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 bg-slate-50 outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Mã Kho (QR)</label>
                <input type="text" id="inWarehouse" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 bg-slate-50 outline-none" placeholder="Vd: KH-001">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Vị trí lưu trữ</label>
                <input type="text" id="inLoc" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 bg-slate-50 outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Số lượng</label>
                <input type="number" id="inQty" value="1" min="1" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 bg-slate-50 outline-none">
            </div>
        </div>
        <div class="mt-6 flex flex-wrap gap-3">
            <button id="btnAdd" onclick="addItem()" class="flex-1 sm:flex-none bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-3.5 px-8 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                THÊM VẬT TƯ
            </button>
            <button id="btnUpdate" onclick="updateItem()" class="hidden flex-1 sm:flex-none bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold py-3.5 px-8 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                LƯU THAY ĐỔI
            </button>
            <button onclick="clearForm()" class="flex-1 sm:flex-none bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-bold py-3.5 px-8 rounded-xl transition-all">LÀM MỚI</button>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 sm:p-6 mb-6">
        <div class="relative mb-5">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
            <input type="text" id="searchInput" oninput="render()" class="w-full pl-11 pr-4 py-4 rounded-2xl border border-slate-200 focus:border-indigo-500 outline-none transition-all text-base bg-slate-50/50" placeholder="Tìm kiếm thiết bị, S/N, P/N hoặc Mã Kho...">
        </div>

        <div class="flex flex-wrap gap-2">
            <button id="btnSync" onclick="syncCloud()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-[10px] font-black py-2.5 px-4 rounded-lg shadow-sm transition-all flex items-center gap-1.5 uppercase disabled:opacity-50">
                🔄 ĐỒNG BỘ CLOUD
            </button>
            <button onclick="openAdvAuditModal()" class="bg-slate-700 hover:bg-slate-800 text-white text-[10px] font-black py-2.5 px-4 rounded-lg shadow-sm transition-all flex items-center gap-1.5 uppercase">
                📋 QUÉT MÃ KIỂM
            </button>
            <button onclick="exportAuditProfessionalReport()" class="bg-indigo-500 hover:bg-indigo-600 text-white text-[10px] font-black py-2.5 px-4 rounded-lg shadow-sm transition-all flex items-center gap-1.5 uppercase">
                📄 PHIẾU KIỂM KÊ
            </button>
            <button onclick="exportToExcel()" class="bg-emerald-700 hover:bg-emerald-800 text-white text-[10px] font-black py-2.5 px-4 rounded-lg shadow-sm transition-all flex items-center gap-1.5 uppercase">
                📊 EXCEL
            </button>
            <button onclick="printQRCodeOnly()" class="bg-slate-900 hover:bg-black text-white text-[10px] font-black py-2.5 px-4 rounded-lg shadow-sm transition-all flex items-center gap-1.5 uppercase">
                🏷️ IN NHÃN QR
            </button>
            <button onclick="location.reload()" class="sm:ml-auto bg-rose-500 hover:bg-rose-600 text-white text-[10px] font-black py-2.5 px-4 rounded-lg shadow-sm transition-all flex items-center gap-1.5 uppercase">
                🚪 THOÁT
            </button>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="table-container custom-scrollbar">
            <table class="w-full text-sm text-left border-separate border-spacing-0">
                <thead class="bg-slate-50/80 sticky top-0 z-10">
                    <tr>
                        <th class="px-6 py-5 font-black text-slate-400 text-[11px] uppercase tracking-wider text-center w-16">STT</th>
                        <th class="px-6 py-5 font-black text-slate-600 text-[11px] uppercase tracking-wider min-w-[250px]">Thiết bị & Thông số</th>
                        <th class="px-6 py-5 font-black text-slate-600 text-[11px] uppercase tracking-wider">Số Serial (S/N)</th>
                        <th class="px-6 py-5 font-black text-slate-600 text-[11px] uppercase tracking-wider text-center">Mã Kho</th>
                        <th class="px-6 py-5 font-black text-slate-600 text-[11px] uppercase tracking-wider text-center">SL</th>
                        <th class="px-6 py-5 font-black text-slate-600 text-[11px] uppercase tracking-wider text-center">Tình trạng</th>
                        <th class="px-6 py-5 font-black text-slate-600 text-[11px] uppercase tracking-wider text-center w-24">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody" class="bg-white"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="advAuditModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[10000] p-4">
    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
        <h3 class="text-xl font-black text-slate-900 mb-6 flex items-center gap-2">📋 Kiểm kê thực tế</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Mã Kho hoặc S/N</label>
                <input type="text" id="audInput" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none bg-slate-50 text-base" placeholder="Nhập hoặc quét mã...">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase ml-1">Ghi chú</label>
                <textarea id="audNote" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 outline-none bg-slate-50 text-base resize-none" placeholder="Tình trạng thực tế..."></textarea>
            </div>
            <div class="flex gap-4 p-3 bg-slate-50 rounded-2xl border border-slate-200 justify-center">
                <label class="cursor-pointer flex items-center gap-2 text-emerald-700 font-bold bg-white px-4 py-2 rounded-xl shadow-sm">
                    <input type="radio" name="audStatus" value="OK" checked class="w-4 h-4"> 🟢 OK
                </label>
                <label class="cursor-pointer flex items-center gap-2 text-rose-700 font-bold bg-white px-4 py-2 rounded-xl shadow-sm">
                    <input type="radio" name="audStatus" value="MISSING" class="w-4 h-4"> 🔴 THIẾU
                </label>
            </div>
        </div>
        <div class="flex flex-col sm:flex-row gap-3 mt-8">
            <button onclick="processAdvancedAudit()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg flex-1 order-1 sm:order-2">CẬP NHẬT</button>
            <button onclick="closeAdvAuditModal()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl flex-1 order-2 sm:order-1">HỦY</button>
        </div>
    </div>
</div>

<div id="printQRArea"></div>

<script>
    // URL của Google Apps Script (Cần đảm bảo script đã deploy dạng Web App và Everyone có quyền Access)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIjGNzZBq5jvoddUuLRFcitskUEy_iD0O9LVwKJVQoKFspSth2FLr4g7PXlMgbCD48/exec";
    const STORAGE_KEY = 'cns_inventory_v1_final';
    
    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let role = null;

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        let bgClass = 'bg-white border-slate-200 text-slate-800';
        let icon = '🔔';
        if (type === 'success') { bgClass = 'bg-emerald-50 border-emerald-200 text-emerald-800'; icon = '✅'; }
        if (type === 'error') { bgClass = 'bg-rose-50 border-rose-200 text-rose-800'; icon = '❌'; }
        toast.className = `toast-enter flex items-center gap-3 px-5 py-4 rounded-2xl border shadow-xl ${bgClass} text-sm font-bold`;
        toast.innerHTML = `<span>${icon}</span><span class="flex-1">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;
        if ((u === 'admin' && p === 'admin') || (u === 'guest' && p === '123456')) {
            role = u;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            if(role === 'admin') document.getElementById('adminArea').classList.remove('hidden');
            showToast("Đăng nhập thành công!", "success");
            initCloudFirstSync();
        } else showToast("Tài khoản hoặc mật khẩu không chính xác!", "error");
    }

    
    function updateSyncUI(status, message) {
        const wrapper = document.getElementById('syncStatusWrapper');
        const icon = document.getElementById('syncIcon');
        const text = document.getElementById('syncText');
        wrapper.classList.remove('hidden', 'bg-amber-100', 'text-amber-800', 'bg-emerald-100', 'text-emerald-800', 'bg-rose-100', 'text-rose-800');
        
        if (status === 'loading') { wrapper.classList.add('flex', 'bg-amber-100', 'text-amber-800'); icon.innerText = '🟡'; }
        else if (status === 'online') { wrapper.classList.add('flex', 'bg-emerald-100', 'text-emerald-800'); icon.innerText = '🟢'; }
        else { wrapper.classList.add('flex', 'bg-rose-100', 'text-rose-800'); icon.innerText = '🔴'; }
        text.innerText = message;
    }

    // Tải dữ liệu từ Cloud khi khởi động
    async function initCloudFirstSync() {
        updateSyncUI('loading', 'Đang kết nối...');
        try {
            // Sử dụng fetch với cache control để lấy dữ liệu mới nhất
            const response = await fetch(`${WEB_APP_URL}?t=${new Date().getTime()}`);
            const cloudData = await response.json();
            
            if (cloudData && Array.isArray(cloudData)) {
                // Logic: Nếu cloud có dữ liệu, ưu tiên lấy từ Cloud
                if (cloudData.length > 0) {
                    inventory = cloudData;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
                    updateSyncUI('online', 'Đã đồng bộ');
                } else {
                    updateSyncUI('online', 'Cloud trống');
                }
            }
        } catch (e) { 
            console.error(e);
            updateSyncUI('offline', 'Chế độ Ngoại tuyến'); 
            showToast("Không thể kết nối Cloud. Sử dụng dữ liệu cục bộ.", "info");
        }
        render();
    }

    // Đẩy dữ liệu lên Cloud (Hàm Sửa)
    async function syncCloud() {
        const btn = document.getElementById('btnSync');
        btn.disabled = true;
        updateSyncUI('loading', 'Đang đẩy dữ liệu...');
        showToast("Bắt đầu đồng bộ lên Cloud...", "info");

        try {
            // Google Apps Script doPost yêu cầu payload dạng URLSearchParams hoặc JSON thô
            // Lưu ý: doPost thường trả về kết quả qua redirect, fetch(no-cors) sẽ không đọc được body trả về nhưng vẫn gửi đi được.
            const params = new URLSearchParams();
            params.append('data', JSON.stringify(inventory));

            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // "no-cors" là bắt buộc đối với Apps Script nếu không xử lý OPTIONS/CORS
                body: params,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            });

            // Vì no-cors không trả về status, chúng ta giả định thành công sau khi fetch hoàn tất
            setTimeout(() => {
                showToast("Đã gửi dữ liệu lên Cloud thành công!", "success");
                updateSyncUI('online', 'Đã lưu Cloud');
                btn.disabled = false;
            }, 1000);

        } catch (e) {
            console.error(e);
            showToast("Lỗi đồng bộ Cloud!", "error");
            updateSyncUI('offline', 'Lỗi kết nối');
            btn.disabled = false;
        }
    }


    function render() {
        const tbody = document.getElementById('inventoryBody');
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        tbody.innerHTML = '';
        let rowCount = 0;

        inventory.forEach((item, idx) => {
            if (Object.values(item).some(v => String(v).toLowerCase().includes(q))) {
                rowCount++;
                
                // Styling the Audit Badge
                let badge = '<span class="text-slate-300 italic text-xs font-medium">Chưa kiểm</span>';
                if(item.auditStatus === 'OK') {
                    badge = `
                        <div class="flex flex-col items-center">
                            <span class="inline-flex items-center bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-full text-[10px] font-bold border border-emerald-100">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5"></span>SẴN SÀNG
                            </span>
                            <span class="text-[9px] text-slate-400 mt-1 font-medium">${item.auditDate}</span>
                        </div>`;
                }
                if(item.auditStatus === 'MISSING') {
                    badge = `
                        <div class="flex flex-col items-center">
                            <span class="inline-flex items-center bg-rose-50 text-rose-700 px-2.5 py-1 rounded-full text-[10px] font-bold border border-rose-100">
                                <span class="w-1.5 h-1.5 rounded-full bg-rose-500 mr-1.5"></span>THIẾU/LỖI
                            </span>
                            <span class="text-[9px] text-slate-400 mt-1 font-medium">${item.auditDate}</span>
                        </div>`;
                }

                tbody.innerHTML += `
                <tr class="inventory-row">
                    <td class="px-6 py-6 text-center">
                        <span class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-50 text-slate-500 font-bold text-xs border border-slate-100">
                            ${rowCount}
                        </span>
                    </td>
                    <td class="px-6 py-6">
                        <div class="flex flex-col">
                            <span class="text-slate-900 font-bold text-[15px] leading-tight mb-1">${item.name}</span>
                            <span class="text-slate-400 text-xs font-medium">P/N: ${item.pn || 'N/A'}</span>
                        </div>
                    </td>
                    <td class="px-6 py-6">
                        <span class="font-mono text-[13px] text-slate-600 bg-slate-50 px-2 py-1 rounded border border-slate-100">
                            ${item.sn}
                        </span>
                    </td>
                    <td class="px-6 py-6 text-center">
                        ${item.warehouse ? `<span class="badge-warehouse">${item.warehouse}</span>` : '<span class="text-slate-300">--</span>'}
                    </td>
                    <td class="px-6 py-6 text-center">
                        <span class="text-slate-900 font-black text-base">${item.qty}</span>
                    </td>
                    <td class="px-6 py-6 text-center leading-none">
                        ${badge}
                    </td>
                    <td class="px-6 py-6 text-center">
                        <div class="flex justify-center gap-2">
                            <button class="w-9 h-9 flex items-center justify-center bg-white text-indigo-600 hover:bg-indigo-600 hover:text-white rounded-xl shadow-sm border border-slate-200 transition-all active:scale-95" onclick="editItem(${idx})">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            ${role === 'admin' ? `
                            <button class="w-9 h-9 flex items-center justify-center bg-white text-rose-500 hover:bg-rose-600 hover:text-white rounded-xl shadow-sm border border-slate-200 transition-all active:scale-95" onclick="deleteItem(${idx})">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }
        });
    }

    function addItem() {
        const name = document.getElementById('inName').value.trim();
        const sn = document.getElementById('inSN').value.trim();
        if(!name || !sn) return showToast("Vui lòng nhập Tên và S/N!", "error");

        inventory.push({
            name, sn,
            pn: document.getElementById('inPN').value.trim(),
            warehouse: document.getElementById('inWarehouse').value.trim().toUpperCase(),
            qty: parseInt(document.getElementById('inQty').value) || 1,
            loc: document.getElementById('inLoc').value.trim(),
            auditStatus: null, auditDate: null, auditNote: ""
        });
        save();
        clearForm();
        showToast("Đã thêm vật tư!", "success");
    }

    function deleteItem(idx) {
        if(confirm(`Xác nhận xóa: ${inventory[idx].name}?`)) {
            inventory.splice(idx, 1);
            save();
            showToast("Đã xóa!", "success");
        }
    }

    function editItem(idx) {
        if(role !== 'admin') return showToast("Yêu cầu quyền Admin!", "error");
        const i = inventory[idx];
        document.getElementById('editIndex').value = idx;
        document.getElementById('inName').value = i.name;
        document.getElementById('inSN').value = i.sn;
        document.getElementById('inPN').value = i.pn || '';
        document.getElementById('inWarehouse').value = i.warehouse || '';
        document.getElementById('inLoc').value = i.loc || '';
        document.getElementById('inQty').value = i.qty;

        document.getElementById('btnAdd').classList.add('hidden');
        document.getElementById('btnUpdate').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateItem() {
        const idx = document.getElementById('editIndex').value;
        inventory[idx] = { ...inventory[idx],
            name: document.getElementById('inName').value,
            sn: document.getElementById('inSN').value,
            pn: document.getElementById('inPN').value,
            warehouse: document.getElementById('inWarehouse').value.toUpperCase(),
            qty: parseInt(document.getElementById('inQty').value),
            loc: document.getElementById('inLoc').value
        };
        save();
        clearForm();
        showToast("Cập nhật thành công!", "success");
    }

    function clearForm() {
        document.getElementById('editIndex').value = "-1";
        document.querySelectorAll('#adminArea input').forEach(i => i.value = (i.id==='inQty'?'1':''));
        document.getElementById('btnAdd').classList.remove('hidden');
        document.getElementById('btnUpdate').classList.add('hidden');
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        render();
    }

    
    function openAdvAuditModal() { document.getElementById('advAuditModal').classList.replace('hidden', 'flex'); document.getElementById('audInput').focus(); }
    function closeAdvAuditModal() { document.getElementById('advAuditModal').classList.replace('flex', 'hidden'); document.getElementById('audInput').value = ''; }

    function processAdvancedAudit() {
        const input = document.getElementById('audInput').value.trim().toUpperCase();
        const nt = document.getElementById('audNote').value.trim();
        const st = document.querySelector('input[name="audStatus"]:checked').value;
        const dt = new Date().toLocaleDateString('vi-VN');

        if(!input) return showToast("Nhập S/N hoặc Mã Kho!", "error");
        
        let foundCount = 0;
        inventory.forEach(item => {
            if(item.warehouse === input || item.sn === input) {
                item.auditStatus = st;
                item.auditDate = dt;
                item.auditNote = nt;
                foundCount++;
            }
        });

        if(foundCount > 0) {
            save();
            showToast(`Đã kiểm kê ${foundCount} thiết bị`, "success");
            closeAdvAuditModal();
        } else showToast("Không tìm thấy mã trong kho!", "error");
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(inventory);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dữ liệu");
        XLSX.writeFile(wb, `Kho_CNS_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function printQRCodeOnly() {
        const area = document.getElementById('printQRArea');
        area.innerHTML = '';
        const filtered = inventory.filter(i => i.warehouse);
        if(filtered.length === 0) return showToast("Không có mã kho để in!", "error");

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'qr-item';
            const qrCanvas = kjua({ text: item.warehouse, size: 200, quiet: 1 });
            div.appendChild(qrCanvas);
            div.innerHTML += `<div class="qr-text">${item.warehouse}</div>`;
            div.innerHTML += `<div style="font-size:6pt; color:gray; text-align:center">${item.name.substring(0,25)}</div>`;
            area.appendChild(div);
        });
        setTimeout(() => window.print(), 500);
    }

    function exportAuditProfessionalReport() {
        const audited = inventory.filter(i => i.auditStatus);
        const win = window.open('','_blank');
        const rows = inventory.map((i,x) => `
            <tr>
                <td>${x+1}</td>
                <td style="text-align:left">${i.name}</td>
                <td>${i.sn}</td>
                <td>${i.auditStatus === 'OK' ? '<span style="color:green">🟢 Tồn tại</span>' : (i.auditStatus === 'MISSING' ? '<span style="color:red">🔴 Thiếu</span>' : '-')}</td>
                <td>${i.auditDate||'-'}</td>
                <td style="text-align:left">${i.auditNote||'-'}</td>
            </tr>`).join('');

        win.document.write(`
            <html><head><style>
                body{font-family:serif;padding:30px;line-height:1.4;font-size:12px;}
                .h{text-align:center;margin-bottom:20px;}
                table{width:100%;border-collapse:collapse;margin-top:15px;}
                th,td{border:1px solid #000;padding:6px;text-align:center;}
                th{background:#eee;}
                .f{margin-top:40px;display:flex;justify-content:space-around;text-align:center;}
            </style></head><body>
                <div class="h">
                    <h2>BIÊN BẢN KIỂM KÊ VẬT TƯ CNS/ATM</h2>
                    <p>Thời điểm báo cáo: ${new Date().toLocaleString('vi-VN')}</p>
                </div>
                <table>
                    <thead><tr><th width="30">STT</th><th>Thiết bị</th><th width="100">S/N</th><th width="80">Trạng thái</th><th width="80">Ngày kiểm</th><th>Ghi chú</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
                <div class="f">
                    <div><b>NGƯỜI LẬP BIỂU</b><br><br><br><br>(Ký, họ tên)</div>
                    <div><b>XÁC NHẬN CỦA ĐỘI TRƯỞNG</b><br><br><br><br>(Ký, đóng dấu)</div>
                </div>
                <script>window.onload=()=>window.print()</` + `script>
            </body></html>`);
        win.document.close();
    }
</script>
</body>
</html>
